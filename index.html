<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0a0a1a">
<title>Gelato Bros v5</title>
<style>
:root{--gold:#FFD700;--pink:#FF3D8A;--green:#3DCA6E;--dark:#0a0a1a;--hud:#0d0d1f}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}

#rotate{display:none;position:fixed;inset:0;z-index:999;background:#0a0a1a;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#rotate .ico{font-size:56px;animation:tilt 1.3s ease-in-out infinite alternate}
@keyframes tilt{from{transform:rotate(-20deg)}to{transform:rotate(20deg)}}
#rotate p{font-size:14px;color:var(--gold);letter-spacing:2px;text-align:center;line-height:2;text-transform:uppercase}
#rotate small{font-size:9px;color:#333;letter-spacing:1px}

#app{width:100%;height:100svh;display:flex;flex-direction:column;overflow:hidden}

/* HUD */
#hud{background:var(--hud);border-bottom:2px solid var(--gold);height:36px;flex-shrink:0;display:flex;align-items:center;padding:0 4px}
.hs{display:flex;align-items:center;gap:3px;padding:0 8px;height:100%;border-right:1px solid #1e1e30}
.hs:last-child{border:none;flex:1}
.hl{font-size:7px;color:#444;letter-spacing:1.5px;text-transform:uppercase}
.hv{font-size:13px;font-weight:900;letter-spacing:2px;color:var(--gold)}
.hv.r{color:var(--pink)}.hv.g{color:var(--green)}
#hph{font-size:8px;color:#666;letter-spacing:.5px;padding-left:6px}
#hver{font-size:7px;color:#222;letter-spacing:1px;margin-left:auto;padding-right:6px}

/* CANVAS */
#gamearea{flex:1;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;min-height:0}
#cv{display:block}

/* RECIPE BAR */
#rb{background:#0c0c1e;border-top:1px solid #1a1a2e;flex-shrink:0;min-height:34px;display:flex;align-items:center;padding:3px 8px;gap:5px;flex-wrap:wrap}
.rlbl{font-size:7px;color:#444;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.rtag{font-size:9px;font-weight:bold;padding:4px 11px;border:2px solid;border-radius:14px;cursor:pointer;letter-spacing:.3px;transition:all .08s;white-space:nowrap}
.rtag:active{transform:scale(.9)}

/* CONTROLS BOTTOM */
#ctrl{background:var(--hud);border-top:2px solid #1a1a2e;flex-shrink:0;height:96px;display:flex;align-items:center;justify-content:space-between;padding:8px 14px}
#ctrl.hidden{display:none}

/* D-PAD */
#dpad{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px;gap:4px}
.dpb{width:50px;height:50px;background:rgba(255,215,0,.07);border:2px solid rgba(255,215,0,.16);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,215,0,.35);transition:all .07s}
.dpb:active,.dpb.on{background:rgba(255,215,0,.25);border-color:rgba(255,215,0,.65);color:var(--gold);transform:scale(.92)}
#dp-u{grid-column:2;grid-row:1}
#dp-l{grid-column:1;grid-row:2}
#dp-r{grid-column:3;grid-row:2}

/* ACTION BTNS */
#abtns{display:flex;align-items:center;gap:14px}
.abtn{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;letter-spacing:.3px;border:3px solid;transition:all .07s;line-height:1.2;text-align:center}
.abtn:active,.abtn.on{transform:scale(.87);filter:brightness(1.7)}
#ab-j{width:64px;height:64px;background:rgba(61,202,110,.1);border-color:rgba(61,202,110,.32);color:rgba(100,220,140,.65)}
#ab-f{width:52px;height:52px;background:rgba(255,61,138,.1);border-color:rgba(255,61,138,.32);color:rgba(255,100,160,.65)}
#ab-j:active,#ab-j.on{background:rgba(61,202,110,.45);color:#fff;border-color:var(--green)}
#ab-f:active,#ab-f.on{background:rgba(255,61,138,.45);color:#fff;border-color:var(--pink)}

/* OVERLAY */
#ovl{position:absolute;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50}
.ologo{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:4px}
.osub{font-size:9px;color:#333;letter-spacing:2px;margin-top:-8px}
#ot{font-size:20px;font-weight:900;letter-spacing:3px}
.omsg{font-size:11px;color:#666;letter-spacing:1px;text-align:center}
.obtn{font-size:12px;font-weight:900;background:var(--pink);color:#fff;border:3px solid var(--gold);padding:13px 34px;cursor:pointer;letter-spacing:3px;border-radius:4px}
.obtn:active{background:var(--gold);color:#000}
</style>
</head>
<body>
<div id="rotate">
  <div class="ico">📱</div>
  <p>Gira il telefono<br>in orizzontale</p>
  <small>Gelato Bros v5 — landscape only</small>
</div>
<div id="app">
  <div id="hud">
    <div class="hs"><span class="hl">SCORE</span><span class="hv" id="hsc">000000</span></div>
    <div class="hs"><span class="hl">VITE</span><span class="hv r" id="hlv">♥♥♥</span></div>
    <div class="hs"><span class="hl">WAVE</span><span class="hv g" id="hwv">1</span></div>
    <div class="hs"><span id="hph">WAVE 1</span></div>
    <span id="hver">v5</span>
  </div>
  <div id="gamearea"><canvas id="cv"></canvas></div>
  <div id="rb"></div>
  <div id="ctrl">
    <div id="dpad">
      <div class="dpb" id="dp-u">▲</div>
      <div class="dpb" id="dp-l">◀</div>
      <div></div>
      <div class="dpb" id="dp-r">▶</div>
    </div>
    <div id="abtns">
      <div class="abtn" id="ab-j">SALTA</div>
      <div class="abtn" id="ab-f">SPARA</div>
    </div>
  </div>
  <div id="ovl">
    <div class="ologo">🍦 GELATO BROS</div>
    <div class="osub">IL GELATAIO DI URBINO — v5</div>
    <h2 id="ot" style="color:var(--pink)">GAME OVER</h2>
    <p class="omsg" id="om">Score: 0</p>
    <button class="obtn" id="ob">▶ RIGIOCA</button>
  </div>
</div>
<script>
// ════════════════════════════════════════
//  GELATO BROS  v5  —  Canvas2D graphics
// ════════════════════════════════════════
const VER = 5;
// Force cache bust
if(location.search.indexOf('v='+VER)===-1){
  location.replace(location.pathname+'?v='+VER);
}

const CV = document.getElementById('cv');
const X  = CV.getContext('2d');
const $ = id => document.getElementById(id);

// Logical canvas — landscape
const LW = 320, LH = 160;
CV.width = LW; CV.height = LH;

function resizeCV(){
  const a = $('gamearea');
  const s = Math.min(a.clientWidth/LW, a.clientHeight/LH);
  CV.style.width  = Math.floor(LW*s)+'px';
  CV.style.height = Math.floor(LH*s)+'px';
}
window.addEventListener('resize',()=>{ checkOri(); resizeCV(); });
setTimeout(resizeCV,60);

function checkOri(){
  const p = window.innerHeight > window.innerWidth;
  $('rotate').style.display = p?'flex':'none';
  $('app').style.display    = p?'none':'flex';
}
checkOri();

// ════════ DRAWING PRIMITIVES ════════════
function circle(x,y,r,fill,stroke,sw=1){
  X.beginPath(); X.arc(x,y,r,0,Math.PI*2);
  if(fill){X.fillStyle=fill;X.fill();}
  if(stroke){X.strokeStyle=stroke;X.lineWidth=sw;X.stroke();}
}
function rect(x,y,w,h,r,fill,stroke,sw=1){
  X.beginPath();
  if(r){X.roundRect?X.roundRect(x,y,w,h,r):X.rect(x,y,w,h);}
  else X.rect(x,y,w,h);
  if(fill){X.fillStyle=fill;X.fill();}
  if(stroke){X.strokeStyle=stroke;X.lineWidth=sw;X.stroke();}
}
function ellipse(x,y,rx,ry,fill){
  X.beginPath();X.ellipse(x,y,rx,ry,0,0,Math.PI*2);
  X.fillStyle=fill;X.fill();
}

// ════════ DRAW FUNCTIONS (no sprites) ════
// All characters drawn with Canvas2D shapes

function drawNikolas(x, y, facingLeft, walkFrame, hurt, shooting){
  X.save(); X.translate(x+6, y+8);
  if(facingLeft) X.scale(-1,1);
  const alpha = (hurt && Math.floor(hurt/4)%2===0) ? 0.3 : 1;
  X.globalAlpha = alpha;

  // Shadow
  X.restore(); X.save();
  ellipse(x+6, y+17, 7, 2, 'rgba(0,0,0,.25)');
  X.translate(x+6, y+8); if(facingLeft)X.scale(-1,1);
  X.globalAlpha = alpha;

  // Body — denim jacket
  rect(-5, 2, 11, 9, 2, '#5a6880');
  rect(-5, 2, 11, 9, 2, null, '#3a4860', .8);
  // Collar
  rect(-2, 2, 5, 3, 1, '#445070');
  // Arms
  rect(-7, 3, 3, 6, 1, '#5a6880');
  rect(5, 3, 3, 6, 1, '#5a6880');
  // Hands
  circle(-6.5, 9, 2, '#D4A574');
  circle(7, 9, 2, '#D4A574');

  // Legs
  const legOff = walkFrame%2===0?0:1;
  rect(-4, 11, 4, 7, 1, '#3a4060');
  rect(1, 11, 4, 7, 1, '#3a4060');
  // leg animation
  if(walkFrame>0){
    rect(-4, 11+(legOff?2:0), 4, 5, 1, '#2a3050');
    rect(1,  11+(legOff?0:2), 4, 5, 1, '#2a3050');
  }
  // Shoes
  rect(-5, 17, 5, 3, 1, '#222');
  rect(1, 17, 5, 3, 1, '#222');

  // Head
  circle(0, -4, 6, '#D4A574');
  circle(0, -4, 6, null, '#B08050', .5);

  // Flat cap — Nikolas signature
  rect(-6, -10, 12, 5, 2, '#8a9098');
  rect(-8, -7, 16, 3, 1, '#7a8088');
  rect(-6, -10, 12, 5, 2, null, '#5a6068', .5);

  // Beard — dark, full
  rect(-4, -2, 8, 4, 1, '#4a3020');
  // Mustache
  rect(-3, -4, 6, 2, 1, '#3a2010');

  // Eyes (light blue, characteristic)
  circle(-2.5, -6, 1.5, '#88C4E8');
  circle(2.5,  -6, 1.5, '#88C4E8');
  circle(-2.5, -6, .7,  '#1a3a5a');
  circle(2.5,  -6, .7,  '#1a3a5a');
  // eye shine
  circle(-2, -6.5, .4, '#fff');
  circle(3,  -6.5, .4, '#fff');

  // Shooting flash
  if(shooting>0){
    X.globalAlpha = .6;
    const grd = X.createRadialGradient(9,5,0,9,5,5);
    grd.addColorStop(0,'#FFE050'); grd.addColorStop(1,'rgba(255,200,0,0)');
    circle(9,5,5,grd);
  }

  X.globalAlpha = 1;
  X.restore();
}

function drawEnemy(m){
  const f = FL[m.fi];
  X.save(); X.translate(m.x+5, m.y+5);
  if(m.vx<0) X.scale(-1,1);

  const flash = m.hf>0;
  const col = flash?'#fff':f.c;
  const dark = flash?'#ddd':f.dark;

  // shadow
  X.restore();X.save();
  ellipse(m.x+5, m.y+11, 6, 1.5, 'rgba(0,0,0,.2)');
  X.translate(m.x+5, m.y+m.by+5);
  if(m.vx<0)X.scale(-1,1);

  // Body blob
  circle(0, 0, 7, col);
  circle(0, 0, 7, null, dark, .8);

  if(m.type===1){
    // Spike version — spikes on top
    for(let i=-2;i<=2;i++){
      X.beginPath();
      X.moveTo(i*3-1,-7);X.lineTo(i*3,-12);X.lineTo(i*3+1,-7);
      X.fillStyle=col;X.fill();
    }
  }

  // Inner belly lighter
  circle(0, 1, 4, flash?'#eee':f.light);

  // Eyes — expressive
  circle(-3, -2, 2.2, '#fff');
  circle(3,  -2, 2.2, '#fff');
  circle(-3, -2, 1.3, '#111');
  circle(3,  -2, 1.3, '#111');
  circle(-2.4,-2.6,.6,'#fff');
  circle(3.6, -2.6,.6,'#fff');

  // Angry brows
  X.strokeStyle=flash?'#aaa':'#222';X.lineWidth=1;
  X.beginPath();X.moveTo(-5,-4);X.lineTo(-1,-5);X.stroke();
  X.beginPath();X.moveTo(5,-4);X.lineTo(1,-5);X.stroke();

  // Mouth
  X.beginPath();X.arc(0,2,3,.2,Math.PI-.2);
  X.strokeStyle=flash?'#aaa':'#222';X.lineWidth=.8;X.stroke();

  X.restore();X.save();

  // HP bar
  const bw=14;
  rect(m.x-1, m.y-5, bw, 2.5, 0, '#111');
  const hpCol = m.hp/m.mhp>.6?'#3DCA6E':m.hp/m.mhp>.3?'#F0A030':'#FF3D8A';
  rect(m.x-1, m.y-5, bw*m.hp/m.mhp, 2.5, 0, hpCol);

  X.restore();
}

function drawBullet(b){
  X.save();X.translate(b.x,b.y);
  // Glow
  const g=X.createRadialGradient(0,0,0,0,0,5);
  g.addColorStop(0,'rgba(255,240,80,.7)');g.addColorStop(1,'rgba(255,200,0,0)');
  circle(0,0,5,g);
  // Core
  circle(0,0,2,'#FFE050');
  circle(0,0,1,'#fff');
  X.restore();
}

function drawScoop(x,y,col,hi,size=6){
  // Cup
  X.save();X.translate(x,y);
  rect(-size*.6, size*.2, size*1.2, size*.9, 2, '#F0E8D0');
  rect(-size*.6, size*.2, size*1.2, size*.9, 2, null,'#C8B898',.5);
  // Scoop ball
  circle(0,0,size,col);
  circle(0,0,size,null,hi,.5);
  // Shine
  circle(-size*.3,-size*.3,size*.22,'rgba(255,255,255,.55)');
  X.restore();
}

function drawCustomer(cx,cy,bob,serving,tR,custT){
  X.save();X.translate(cx,cy+bob);

  // Shadow
  ellipse(0,14,'rgba(0,0,0,.2)' && (X.restore(),X.save(),ellipse(cx,cy+bob+14,8,2,'rgba(0,0,0,.2)'),X.translate(cx,cy+bob)),8,2,'rgba(0,0,0,.2)');

  // Body
  rect(-6,3,12,10,3,'#FF8800');
  rect(-6,3,12,10,3,null,'#CC5500',.7);
  // Head
  circle(0,-4,7,'#E8C090');
  circle(0,-4,7,null,'#C09060',.5);
  // Hair
  rect(-5,-11,10,7,3,'#4a2a1a');
  // Eyes
  circle(-2.5,-5,1.5,'#333');
  circle(2.5,-5,1.5,'#333');
  // Smile
  X.beginPath();X.arc(0,-2,3,.1,Math.PI-.1);X.strokeStyle='#333';X.lineWidth=.8;X.stroke();
  // Arms
  rect(-9,4,4,5,1,'#E8C090');
  rect(6,4,4,5,1,'#E8C090');

  X.restore();

  // Speech bubble
  if(!serving){
    const bx=cx-16,by=cy+bob-28,bw=32,bh=14;
    rect(bx,by,bw,bh,3,'#fffef0','#ddd',.5);
    // Tail
    X.beginPath();X.moveTo(cx-3,by+bh);X.lineTo(cx+3,by+bh);X.lineTo(cx,by+bh+4);
    X.fillStyle='#fffef0';X.fill();
    X.fillStyle='#222';X.font='bold 7px Courier New';X.textAlign='center';
    X.fillText(tR.map(fi=>EM[fi]).join('+'),cx,by+bh-3);
  }

  // Timer bar
  const tw=28;
  rect(cx-14,cy+bob+16,tw,3,0,'#111');
  const tc=custT/300;
  rect(cx-14,cy+bob+16,tw*tc,3,0,tc>.6?'#3DCA6E':tc>.3?'#F0A030':'#FF3D8A');
}

// ════════ BACKGROUND ════════════════════
function drawBG(tick, clouds, hX, h2X){
  // Sky gradient
  const sky=X.createLinearGradient(0,0,0,LH*.7);
  sky.addColorStop(0,'#1a4a9a');
  sky.addColorStop(.5,'#4a8fd4');
  sky.addColorStop(1,'#80b8f0');
  X.fillStyle=sky; X.fillRect(0,0,LW,LH*.75);

  // Sun
  const sunG=X.createRadialGradient(LW*.85,18,0,LW*.85,18,20);
  sunG.addColorStop(0,'rgba(255,240,120,.95)');
  sunG.addColorStop(.6,'rgba(255,210,80,.6)');
  sunG.addColorStop(1,'rgba(255,180,0,0)');
  circle(LW*.85,18,20,sunG);

  // Mountains back (dark blue)
  X.fillStyle='#2a3d6a';
  for(let i=0;i<6;i++){
    const mx=((i*80+hX*18))%(LW+70)-35;
    X.beginPath();X.moveTo(mx,LH-20);X.lineTo(mx+22,LH-48);X.lineTo(mx+44,LH-20);X.closePath();X.fill();
  }
  // Snow peaks
  X.fillStyle='#c8d8f0';
  for(let i=0;i<6;i++){
    const mx=((i*80+hX*18))%(LW+70)-35;
    X.beginPath();X.moveTo(mx+16,LH-44);X.lineTo(mx+22,LH-48);X.lineTo(mx+28,LH-44);X.closePath();X.fill();
  }

  // Clouds (rounded, layered)
  X.fillStyle='rgba(255,255,255,.88)';
  clouds.forEach(c=>{
    const cx=c.x*4, cy=c.y*4; // scale up from logical coords
    X.beginPath();
    X.arc(cx,     cy,    9,0,Math.PI*2);
    X.arc(cx+10,  cy-4,  12,0,Math.PI*2);
    X.arc(cx+22,  cy,    9,0,Math.PI*2);
    X.arc(cx+12,  cy+4,  10,0,Math.PI*2);
    X.fill();
  });

  // Mid hills (green)
  const hillG=X.createLinearGradient(0,LH-28,0,LH-14);
  hillG.addColorStop(0,'#3a9020');hillG.addColorStop(1,'#2a6a10');
  X.fillStyle=hillG;
  for(let i=0;i<7;i++){
    const mx=((i*65+20+h2X*12))%(LW+50)-25;
    X.beginPath();X.arc(mx+20,LH-14,22,Math.PI,0);X.fill();
  }

  // Decorative elements
  // Pipes
  [22,90,160,240].forEach(px=>{
    // pipe body
    const pg=X.createLinearGradient(px,0,px+14,0);
    pg.addColorStop(0,'#2ab060');pg.addColorStop(.4,'#3dcf78');pg.addColorStop(1,'#1a8040');
    rect(px,LH-24,14,18,0,pg);
    // pipe cap
    rect(px-2,LH-26,18,6,2,'#3dcf78');
    rect(px-2,LH-26,18,6,2,null,'#1a8040',.8);
  });

  // Coin blocks
  [14,18,22,60,64,112,116,160].forEach(bx=>{
    const bg=X.createLinearGradient(bx,LH-32,bx,LH-24);
    bg.addColorStop(0,'#F0B800');bg.addColorStop(1,'#C08000');
    rect(bx,LH-32,8,8,1,bg,'#A06000',.8);
    // ? symbol
    X.fillStyle='#fff';X.font='bold 6px Courier New';X.textAlign='center';
    X.fillText('?',bx+4,LH-26);
  });

  // Ground layers
  // Grass top
  const gG=X.createLinearGradient(0,LH-10,0,LH-6);
  gG.addColorStop(0,'#5ec832');gG.addColorStop(1,'#3a9018');
  rect(0,LH-10,LW,4,0,gG);

  // Dirt
  const dG=X.createLinearGradient(0,LH-6,0,LH);
  dG.addColorStop(0,'#8B4513');dG.addColorStop(1,'#5a2a08');
  rect(0,LH-6,LW,6,0,dG);

  // Brick pattern on dirt
  for(let tx=0;tx<LW;tx+=16){
    rect(tx,LH-5,16,5,0,null,'rgba(0,0,0,.15)',.3);
    rect(tx+8,LH-2,16,3,0,null,'rgba(0,0,0,.1)',.3);
  }

  // Grass tufts
  X.strokeStyle='#3a9018';X.lineWidth=1.5;
  for(let gx=4;gx<LW;gx+=8){
    const h=2+Math.sin(gx*.8)*1;
    X.beginPath();X.moveTo(gx,LH-10);X.lineTo(gx-1,LH-10-h);X.stroke();
    X.beginPath();X.moveTo(gx+1,LH-10);X.lineTo(gx+2,LH-10-h*.8);X.stroke();
  }

  // Bushes
  [8,44,76,120,168,210,268].forEach(bx=>{
    const bG=X.createRadialGradient(bx+8,LH-13,0,bx+8,LH-13,10);
    bG.addColorStop(0,'#4db824');bG.addColorStop(1,'#2a6610');
    circle(bx+4, LH-13, 7, bG);
    circle(bx+9, LH-14, 8, bG);
    circle(bx+14,LH-13, 7, bG);
  });
}

// ════════ FLAVORS ════════════════════════
const FL=[
  {n:'Cioccolato',c:'#7B4F2E',light:'#AA7050',h:'#B08050',dark:'#4a2c10'},
  {n:'Fragola',   c:'#E84393',light:'#FF80C0',h:'#FF60B0',dark:'#9a1050'},
  {n:'Pistacchio',c:'#5BAF2C',light:'#8FD050',h:'#70C040',dark:'#2a5a10'},
  {n:'Limone',    c:'#F0D000',light:'#FFE840',h:'#FFE020',dark:'#806000'},
  {n:'Panna',     c:'#F5ECD7',light:'#FFFFFF',h:'#FFFFFF',dark:'#9a9080'},
];
const EM=['🍫','🍓','🌿','🍋','🥛'];
const RCP=[[0,1],[2,3],[0,4],[1,4],[0,1,2]];

// ════════ INPUT ══════════════════════════
const KEYS={};
document.addEventListener('keydown',e=>{KEYS[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',  e=>KEYS[e.key]=false);

function holdBtn(id,key){
  const el=$(id);if(!el)return;
  const on =e=>{e.preventDefault();KEYS[key]=true; el.classList.add('on');};
  const off=e=>{e.preventDefault();KEYS[key]=false;el.classList.remove('on');};
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend',   off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
holdBtn('dp-l','ArrowLeft');holdBtn('dp-r','ArrowRight');holdBtn('dp-u','ArrowUp');
holdBtn('ab-f',' ');holdBtn('ab-j','w');

// ════════ PARTICLES ══════════════════════
let PARTS=[];
function boom(x,y,col,n,big=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=big?4+Math.random()*3:2+Math.random()*2.5;
    PARTS.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,col,life:40+Math.random()*30,sz:big?3:1.5});
  }
}

function showCtrl(v){$('ctrl').classList.toggle('hidden',!v);}

// ════════ GAME ═══════════════════════════
const G={
  sc:0,hp:3,wave:1,state:'init',tick:0,
  pl:null,buls:[],mons:[],drps:[],
  scd:0,transT:0,_wclr:false,
  tR:[],collected:[],items:[],
  cust:null,custT:0,serving:false,sResult:null,sTimer:0,sOrder:[],
  clouds:[{x:8,y:2},{x:42,y:5},{x:68,y:1.5}],
  hX:0,h2X:80,

  syncHUD(){
    $('hsc').textContent=String(this.sc).padStart(6,'0');
    $('hlv').textContent='♥'.repeat(Math.max(0,this.hp));
    $('hwv').textContent=this.wave;
  },

  initFight(){
    this.state='fight';this.transT=0;this._wclr=false;
    $('hph').textContent='WAVE '+this.wave+' — ELIMINA I MOSTRI!';
    $('hph').style.color='#FF8844';
    $('rb').innerHTML='';
    showCtrl(true);
    this.pl={x:LW/2-6,y:LH-38,vy:0,onG:true,face:1,wf:0,wt:0,hurt:0,sh:0};
    this.buls=[];this.drps=[];PARTS=[];
    const cnt=3+this.wave;this.mons=[];
    for(let i=0;i<cnt;i++){
      const fi=i%FL.length;
      this.mons.push({
        x:12+Math.floor(Math.random()*(LW-30)),
        y:12+Math.floor(Math.random()*35),
        hp:2+(this.wave>2?1:0),mhp:2+(this.wave>2?1:0),
        vx:(Math.random()>.5?.5:-.5)*(1+this.wave*.12),
        vy:0,t:Math.random()*200,
        fi,type:Math.random()>.5?0:1,
        dead:false,hf:0,by:0,jt:50+Math.floor(Math.random()*90)
      });
    }
  },

  initCollect(){
    this.state='collect';
    this.tR=RCP[Math.floor(Math.random()*RCP.length)].slice();
    this.collected=[];this.items=[];PARTS=[];
    $('hph').textContent='RACCOGLI GLI INGREDIENTI GIUSTI!';
    $('hph').style.color='#FFD700';
    showCtrl(false);
    this.tR.forEach((fi,i)=>{
      this.items.push({
        x:16+Math.floor(i/this.tR.length*(LW-32)),
        y:16+Math.floor(Math.random()*(LH-55)),
        fi,done:false,bt:Math.random()*60
      });
    });
    for(let d=0;d<3;d++){
      let fi;do{fi=Math.floor(Math.random()*FL.length);}while(this.tR.includes(fi));
      this.items.push({
        x:12+Math.floor(Math.random()*(LW-24)),
        y:12+Math.floor(Math.random()*(LH-50)),
        fi,done:false,bt:Math.random()*60,bad:true
      });
    }
    this.updRB();
  },

  initServe(){
    this.state='serve';
    this.serving=false;this.sResult=null;this.sTimer=0;
    this.custT=300;this.sOrder=[];
    this.cust={x:LW/2,y:LH/2-18,a:0};
    $('hph').textContent='SERVI IL CLIENTE!';
    $('hph').style.color='#3DCA6E';
    showCtrl(false);
    this.updRB();
  },

  updRB(){
    const rb=$('rb');rb.innerHTML='';
    if(this.state!=='collect'&&this.state!=='serve')return;
    const l=document.createElement('span');l.className='rlbl';
    l.textContent=this.state==='collect'?'RICETTA: ':'ORDINE: ';
    rb.appendChild(l);
    this.tR.forEach(fi=>{
      const f=FL[fi],got=this.collected.includes(fi);
      const b=document.createElement('div');b.className='rtag';
      b.textContent=EM[fi]+' '+f.n;
      b.style.cssText=`border-color:${f.c};color:${got?'#000':f.c};background:${got?f.c:'transparent'}`;
      if(this.state==='serve'){
        b.addEventListener('touchend',e=>{e.preventDefault();this.serveClick(fi);},{passive:false});
        b.addEventListener('click',()=>this.serveClick(fi));
      }
      rb.appendChild(b);
    });
  },

  serveClick(fi){
    if(this.serving||this.state!=='serve')return;
    this.sOrder.push(fi);
    boom(this.cust.x,this.cust.y,FL[fi].c,10);
    if(this.sOrder.length===this.tR.length){
      const ok=this.tR.every((f,i)=>this.sOrder[i]===f);
      this.sResult=ok;this.sTimer=150;this.serving=true;this.sOrder=[];
      if(ok){this.sc+=150*this.wave;boom(this.cust.x,this.cust.y,'#FFD700',32,true);}
      else  {this.hp=Math.max(0,this.hp-1);boom(this.cust.x,this.cust.y,'#FF3D8A',24,true);}
      this.syncHUD();
      if(this.hp<=0)setTimeout(()=>this.gameOver(false),400);
    }
  },

  update(){
    this.tick++;
    this.clouds.forEach(c=>{c.x-=.04;if(c.x<-20)c.x=LW/4+4;});
    this.hX=(this.hX+.012)%280;this.h2X=(this.h2X+.007)%360;
    PARTS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;});
    PARTS=PARTS.filter(p=>p.life>0);
    if(this.state==='fight')this.uFight();
    else if(this.state==='collect')this.items.forEach(i=>i.bt++);
    else if(this.state==='serve')this.uServe();
    this.syncHUD();
  },

  uFight(){
    const p=this.pl;
    if(KEYS['ArrowLeft']||KEYS['a']){p.x=Math.max(0,p.x-.7);p.face=-1;p.wt++;}
    else if(KEYS['ArrowRight']||KEYS['d']){p.x=Math.min(LW-14,p.x+.7);p.face=1;p.wt++;}
    else p.wt=0;
    if(p.wt>0&&this.tick%10===0)p.wf=(p.wf+1)%4;
    if((KEYS['ArrowUp']||KEYS['w'])&&p.onG){p.vy=-3.8;p.onG=false;}
    p.vy+=.2;p.y+=p.vy;
    const gr=LH-38;
    if(p.y>=gr){p.y=gr;p.vy=0;p.onG=true;}
    if(p.y<0){p.y=0;p.vy=0;}
    if(p.hurt>0)p.hurt--;if(p.sh>0)p.sh--;

    this.scd++;
    if(KEYS[' ']&&this.scd>14){
      this.scd=0;p.sh=8;
      this.buls.push({x:p.x+(p.face>0?14:0),y:p.y+6,vx:p.face*5,vy:-1,life:55});
      boom(p.x+7,p.y+4,'#FFE050',5);
    }
    this.buls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
    this.buls=this.buls.filter(b=>b.life>0&&b.y>-8&&b.x>-10&&b.x<LW+10);

    this.mons.forEach(m=>{
      if(m.dead)return;
      m.t++;m.x+=m.vx;m.by=Math.sin(m.t*.13)*1.2;
      if(m.hf>0)m.hf--;
      if(m.x<3||m.x>LW-16)m.vx*=-1;
      m.jt--;if(m.jt<=0){m.vy=-2.8;m.jt=55+Math.floor(Math.random()*85);}
      m.vy+=.18;m.y+=m.vy;
      const mg=LH-38;
      if(m.y>mg){m.y=mg;m.vy=0;}if(m.y<0){m.y=0;m.vy=0;}

      this.buls.forEach(b=>{
        if(!b.hit&&b.x>m.x-2&&b.x<m.x+14&&b.y>m.y-2&&b.y<m.y+14){
          m.hp--;b.hit=true;m.hf=10;
          boom(m.x+5,m.y+5,FL[m.fi].c,12);
          if(m.hp<=0){
            m.dead=true;this.sc+=15;
            this.drps.push({x:m.x,y:m.y,fi:m.fi,bt:0});
            boom(m.x+5,m.y+5,FL[m.fi].c,26,true);
          }
        }
      });
      this.buls=this.buls.filter(b=>!b.hit);

      if(p.hurt===0&&p.x+12>m.x&&p.x<m.x+12&&p.y+20>m.y&&p.y<m.y+14){
        m.dead=true;this.hp=Math.max(0,this.hp-1);p.hurt=70;
        boom(p.x+7,p.y+10,'#FF3D8A',20,true);p.vy=-3;
        if(this.hp<=0)setTimeout(()=>this.gameOver(false),400);
      }
    });
    this.drps.forEach(d=>d.bt++);

    if(!this._wclr&&this.mons.length>0&&this.mons.every(m=>m.dead)){
      this._wclr=true;this.transT=1;
      setTimeout(()=>{
        this.transT=0;this.wave++;
        if(this.wave>3)this.initCollect();else this.initFight();
      },1800);
    }
  },

  uServe(){
    if(this.cust)this.cust.a++;
    if(!this.serving){
      this.custT--;
      if(this.custT<=0){
        this.hp=Math.max(0,this.hp-1);
        this.sResult=false;this.serving=true;this.sTimer=120;
        boom(this.cust.x,this.cust.y,'#FF3D8A',24,true);
        if(this.hp<=0)setTimeout(()=>this.gameOver(false),400);
      }
    }
    if(this.serving&&this.sTimer>0){
      this.sTimer--;
      if(this.sTimer===0){
        if(this.sResult&&this.hp>0){this.wave++;this.wave>4?this.gameOver(true):this.initFight();}
        else if(this.hp>0)this.initFight();
      }
    }
  },

  gameOver(win){
    this.state='over';
    $('ovl').style.display='flex';
    $('ot').textContent=win?'🍦 HAI VINTO!':'GAME OVER';
    $('ot').style.color=win?'#3DCA6E':'#FF3D8A';
    $('om').textContent=(win?'Gelateria aperta! ':'Ritenta gelataio! ')+'Score: '+this.sc;
  },

  restart(){
    this.sc=0;this.hp=3;this.wave=1;this._wclr=false;
    PARTS=[];$('ovl').style.display='none';
    this.initFight();
  },

  draw(){
    X.clearRect(0,0,LW,LH);
    drawBG(this.tick,this.clouds,this.hX,this.h2X);

    if(this.state==='fight'){
      // drops
      this.drps.forEach(d=>{
        const f=FL[d.fi],bob=Math.sin(d.bt*.1)*1.5;
        drawScoop(d.x+4,d.y+4+bob,f.c,f.h,7);
      });
      // bullets
      this.buls.forEach(b=>drawBullet(b.x,b.y));
      // enemies
      this.mons.forEach(m=>{if(!m.dead)drawEnemy(m);});
      // player
      const p=this.pl;
      if(p) drawNikolas(p.x,p.y,p.face<0,p.wt>0?p.wf:0,p.hurt,p.sh);
      // wave banner
      if(this.transT>0){
        rect(0,LH/2-16,LW,32,0,'rgba(0,0,0,.78)');
        X.fillStyle='#FFD700';X.font='bold 11px Courier New';X.textAlign='center';
        X.fillText('★  ONDA '+this.wave+' COMPLETATA!  ★',LW/2,LH/2+4);
      }
    } else if(this.state==='collect'){
      // scanlines
      X.fillStyle='rgba(0,10,30,.04)';
      for(let y=0;y<LH;y+=3)X.fillRect(0,y,LW,1);
      this.items.forEach(item=>{
        if(item.done)return;
        const f=FL[item.fi],bob=Math.sin(item.bt*.07)*2;
        const ix=item.x,iy=item.y+bob;
        const a=.35+Math.sin(item.bt*.1)*.3;
        X.globalAlpha=a;
        circle(ix+4,iy+4,10,null,item.bad?'#FF3D8A':f.c,2);
        X.globalAlpha=1;
        drawScoop(ix+4,iy+4,f.c,f.h,7);
        if(item.bad){
          X.fillStyle='#FF3D8A';X.font='bold 7px Courier New';X.textAlign='center';
          X.fillText('✗',ix+4,iy-4);
        }
        X.fillStyle='#FFD700';X.font='bold 6px Courier New';X.textAlign='center';
        X.fillText(f.n,ix+4,iy+17);
      });
      rect(0,LH-14,LW,14,0,'rgba(0,0,0,.65)');
      X.fillStyle='#887755';X.font='6px Courier New';X.textAlign='center';
      X.fillText('TOCCA gli ingredienti giusti — evita le trappole ✗',LW/2,LH-4);
    } else if(this.state==='serve'){
      if(this.cust){
        drawCustomer(this.cust.x,this.cust.y,Math.sin(this.cust.a*.09)*1.5,
          this.serving,this.tR,this.custT);
      }
      if(this.serving&&this.sTimer>60){
        rect(0,LH/2-18,LW,36,0,'rgba(0,0,0,.82)');
        X.fillStyle=this.sResult?'#3DCA6E':'#FF3D8A';
        X.font='bold 10px Courier New';X.textAlign='center';
        X.fillText(this.sResult?'PERFETTO! +'+150*this.wave+' pts':'SBAGLIATO! -1 vita',LW/2,LH/2+4);
      }
    }

    // particles
    PARTS.forEach(p=>{
      X.globalAlpha=Math.max(0,p.life/55);
      X.fillStyle=p.c;
      circle(p.x,p.y,p.sz,p.c);
      X.globalAlpha=1;
    });
    X.globalAlpha=1;
  },
};

// ════════ CANVAS TAP ═════════════════════
function handleTap(cx,cy){
  if(G.state!=='collect')return;
  G.items.forEach(item=>{
    if(item.done)return;
    const bob=Math.sin(item.bt*.07)*2;
    if(Math.hypot(cx-(item.x+4),cy-(item.y+4+bob))<13){
      item.done=true;
      if(!item.bad){
        G.collected.push(item.fi);
        boom(item.x+4,item.y+4,FL[item.fi].c,14,true);
        G.updRB();
        if(G.collected.length===G.tR.length){
          const ok=G.tR.every(fi=>G.collected.includes(fi));
          if(ok)setTimeout(()=>G.initServe(),500);
          else{G.collected=[];G.updRB();}
        }
      } else {
        boom(item.x+4,item.y+4,'#FF3D8A',16,true);
        G.hp=Math.max(0,G.hp-1);G.syncHUD();
        if(G.hp<=0)G.gameOver(false);
      }
    }
  });
}
CV.addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0],r=CV.getBoundingClientRect();
  handleTap((t.clientX-r.left)*LW/r.width,(t.clientY-r.top)*LH/r.height);
},{passive:false});
CV.addEventListener('click',e=>{
  const r=CV.getBoundingClientRect();
  handleTap((e.clientX-r.left)*LW/r.width,(e.clientY-r.top)*LH/r.height);
});
$('ob').addEventListener('touchend',e=>{e.preventDefault();G.restart();},{passive:false});
$('ob').addEventListener('click',()=>G.restart());

function loop(){G.update();G.draw();requestAnimationFrame(loop);}
G.restart();loop();
</script>
</body>
</html>
