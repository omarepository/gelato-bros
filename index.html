<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#1a0a00">
<title>Gelato Bros 🍦</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{background:#000;width:100%;height:100%;overflow:hidden;touch-action:none}
#gw{width:100%;max-width:480px;margin:0 auto;background:#000;display:flex;flex-direction:column;height:100vh;position:relative;font-family:'Courier New',monospace}
#hud{background:#1a0a00;height:38px;display:flex;align-items:center;border-bottom:2px solid #E8A000;flex-shrink:0}
.hc{display:flex;align-items:center;gap:4px;padding:0 10px;border-right:1px solid #3a2000;height:100%}
.hl{font-size:8px;color:#7a5000;letter-spacing:1px}
.hv{font-size:13px;font-weight:bold;color:#FFD700;letter-spacing:2px;min-width:52px}
.hv.r{color:#FF4477}.hv.g{color:#44CC66}
#ph{font-size:9px;color:#997755;letter-spacing:1px;flex:1;padding:0 8px;line-height:1.2}
#cv{display:block;image-rendering:pixelated;flex:1;width:100%;object-fit:contain}
#ib{background:#110800;border-top:2px solid #3a2000;padding:4px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:30px;flex-shrink:0}
.il{font-size:8px;color:#554433;letter-spacing:1px}
.it{font-size:9px;font-weight:bold;padding:3px 8px;border:2px solid;cursor:pointer;border-radius:2px;letter-spacing:1px;touch-action:manipulation}
#dpad{display:grid;grid-template-areas:'. u .' 'l . r' '. d .';grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:3px;position:absolute;bottom:40px;left:12px;z-index:20}
.dpb{background:rgba(255,200,50,.18);border:2px solid rgba(255,200,50,.35);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(255,220,80,.7);touch-action:manipulation;cursor:pointer;transition:background .08s}
.dpb:active,.dpb.pressed{background:rgba(255,200,50,.38);color:#FFD700}
#dbtn-u{grid-area:u}#dbtn-l{grid-area:l}#dbtn-r{grid-area:r}#dbtn-d{grid-area:d}
#rbtns{position:absolute;bottom:40px;right:12px;z-index:20;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.rbtn{background:rgba(255,50,150,.2);border:2px solid rgba(255,50,150,.45);border-radius:50%;width:58px;height:58px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:rgba(255,100,180,.8);font-family:'Courier New',monospace;letter-spacing:1px;touch-action:manipulation;cursor:pointer;transition:background .08s;text-align:center;line-height:1.2}
.rbtn:active,.rbtn.pressed{background:rgba(255,50,150,.5);color:#fff}
#rbtn-jump{background:rgba(50,150,255,.2);border-color:rgba(50,150,255,.45);color:rgba(100,180,255,.8)}
#rbtn-jump:active,#rbtn-jump.pressed{background:rgba(50,150,255,.5);color:#fff}
#ovl{position:absolute;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:30}
#ovl .logo{font-size:22px;font-weight:900;color:#E8A000;letter-spacing:3px}
#ovl h2{font-size:18px;font-weight:bold;letter-spacing:3px}
#ovl p{font-size:11px;color:#998866;letter-spacing:1px;text-align:center;padding:0 20px}
#ovl button{font-size:12px;font-weight:bold;background:#E84393;color:#fff;border:3px solid #FFD700;padding:12px 32px;cursor:pointer;letter-spacing:3px;border-radius:4px;touch-action:manipulation}
#ovl button:active{background:#FFD700;color:#000}
</style>
</head>
<body>
<div id="gw">
  <div id="hud">
    <div class="hc"><span class="hl">SCORE</span><span class="hv" id="hs">000000</span></div>
    <div class="hc"><span class="hl">VITE</span><span class="hv r" id="hh">♥♥♥</span></div>
    <div class="hc"><span class="hl">WAVE</span><span class="hv g" id="hw">1</span></div>
    <span id="ph">WAVE 1 — ELIMINA I MOSTRI!</span>
  </div>
  <canvas id="cv"></canvas>
  <div id="ib"></div>

  <!-- D-PAD -->
  <div id="dpad">
    <div class="dpb" id="dbtn-u">▲</div>
    <div class="dpb" id="dbtn-l">◀</div>
    <div class="dpb" id="dbtn-r">▶</div>
    <div class="dpb" id="dbtn-d">▼</div>
  </div>

  <!-- ACTION BUTTONS -->
  <div id="rbtns">
    <div class="rbtn" id="rbtn-jump">SALTA</div>
    <div class="rbtn" id="rbtn-fire">SPARA</div>
  </div>

  <div id="ovl">
    <div class="logo">🍦 GELATO BROS</div>
    <h2 id="ot" style="color:#FF4477">GAME OVER</h2>
    <p id="om">Score: 0</p>
    <button onclick="G.restart()">▶ RIGIOCA</button>
  </div>
</div>

<script>
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
const $=id=>document.getElementById(id);
const hs=$('hs'),hh=$('hh'),hw=$('hw'),ph=$('ph'),ib=$('ib'),ovl=$('ovl');

// Canvas size: logical pixels
const LW=160,LH=110; // logical game world size
const S=1; // 1 logical = 1 canvas pixel (we scale via CSS/transform)
CV.width=LW;CV.height=LH;

// Resize canvas to fill available space
function resizeCV(){
  const gw=document.getElementById('gw');
  const avail=gw.clientHeight - $('hud').offsetHeight - $('ib').offsetHeight;
  const availW=gw.clientWidth;
  const scaleH=avail/LH, scaleW=availW/LW;
  const scale=Math.min(scaleH,scaleW);
  CV.style.width=(LW*scale)+'px';
  CV.style.height=(LH*scale)+'px';
  CV.style.display='block';
  CV.style.margin='0 auto';
}
window.addEventListener('resize',resizeCV);
setTimeout(resizeCV,100);

// ── SPRITE ENGINE ──────────────────────────────────────────
function spr(rows,p){return rows.map(r=>[...r].map(c=>p[c]??null));}
function blit(sp,px,py,flip=false){
  const W2=sp[0].length;
  sp.forEach((row,r)=>row.forEach((c,col)=>{
    if(!c)return;
    const dc=flip?W2-1-col:col;
    X.fillStyle=c;
    X.fillRect(px+dc,py+r,1,1);
  }));
}

// ── SPRITES ────────────────────────────────────────────────

// NIKOLAS 10x14 — cappellino grigio, barba, occhi chiari
const NK=spr([
  '..GGGGGGG.',
  '.GGGGGGGGg',
  '.GGGGGGGGg',
  '..SSSSSSS.',
  '.SSSeeSSSS',
  'SSSSSSbSSS',
  '.SSSmSSSmS',
  '.SBBBBBBBs',
  'sBBBBBBBBs',
  '.MMMMMMMM.',
  'MMMMMMYMMM',
  'MMMMMMMMMM',
  '.MM....MM.',
  '.MM....MM.',
],{G:'#9aA0A8',g:'#6a7078',S:'#D4A574',s:'#B08050',e:'#88C4E8',b:'#5a3a1a',m:'#C09060',B:'#8a6a40',M:'#7a808a',Y:'#E8A000','.':null});

// BLOB ENEMY 10x10
const BL_R=[
  '..EEEEEE..',
  '.EEEEEEEE.',
  'EEEeEeEEEE',
  'EE.EE.EEEE',
  'EEEEmmEEEE',
  '.EEmmmEEE.',
  '..EEEEEE..',
  '...EEEE...',
  '..........','..........'];
// SPIKE ENEMY 10x10  
const SK_R=[
  '.E......E.',
  'EEE....EEE',
  'EEEEEEEEEE',
  'EEeEEEeEEE',
  'EEEEmmEEEE',
  '.EEmmmEEE.',
  '..EEEEEE..',
  '...EEEE...',
  '..........','..........'];
function mkE(rows,col,hi,hurt){
  return spr(rows,{E:hurt?'#fff':col,e:hi,m:'#111','.':null});
}

// BULLET 3x5
const BUL=spr(['.Y.','.Y.','YYY','.Y.','.Y.'],{Y:'#FFE050','.':null});

// SCOOP DROP 7x9
function mkScoop(c,h){
  return spr(['.CCCCC.','CChCCCC','CCCCCCC','.CCCCC.','..CCC..','..WWW..','..WWW..','...W...','...W...'],
  {C:c,h:'#fff',W:'#F0E8D0','.':null});
}

// CUSTOMER 10x13
const CU=spr([
  '...OOOO...',
  '..OHHOO...',
  '..OOOOOO..',
  '..OoOOoO..',
  '..OOOOOO..',
  '.RRRRRRRR.',
  'RRRRRRRRRR',
  'RRrRRRrRRR',
  'RRRRRRRRRR',
  '.RRR..RRR.',
  '.RR....RR.',
  '.RR....RR.',
  '..........'],
{O:'#E8C090',o:'#C09060',H:'#4a2a1a',h:'#88C4E8',R:'#E84393',r:'#C02060','.':null});

// COIN BLOCK 6x6
const CB=spr(['AAAAAA','A.QQ.A','A.QQ.A','A.QQ.A','A....A','AAAAAA'],{A:'#C88000',Q:'#FFD700','.':null});

// PIPE 8x6
const PP=spr([
  '........','.GGGGGG.','GGGGGGGG','GGGGGGGG','.GG..GG.','.GG..GG.'],
{G:'#1D9E75','.':null});

// CLOUD 14x5
const CLD=spr([
  '....WWWW......',
  '..WWWWWWWWW...',
  '.WWwWWWWWWWWW.',
  '.WWWWWWWWWWWW.',
  '..WWWWWWWWWW..'],
{W:'#FFFFFF',w:'#E8E8E8','.':null});

// BUSH 10x5
const BSH=spr([
  '...BBBB...',
  '.BBBBBBBB.',
  'BBBBbBBBBB',
  'BBBbbBBBBB',
  '.BBBBBBBB.'],
{B:'#2B5D11',b:'#1a4008','.':null});

// ── FLAVORS ────────────────────────────────────────────────
const FL=[
  {n:'Cioccolato',c:'#7B4F2E',h:'#B07050'},
  {n:'Fragola',c:'#E84393',h:'#FF80C0'},
  {n:'Pistacchio',c:'#5BAF2C',h:'#8FD050'},
  {n:'Limone',c:'#F0D000',h:'#FFE840'},
  {n:'Panna',c:'#F0E8D0',h:'#FFFFFF'},
];
const EM=['🍫','🍓','🌿','🍋','🥛'];
const RCP=[[0,1],[2,3],[0,4],[1,4],[0,1,2]];

// ── TOUCH CONTROLS ─────────────────────────────────────────
const KEYS={};
function setupTouch(){
  function hold(id,key){
    const el=$(id);
    const on=e=>{e.preventDefault();KEYS[key]=true;el.classList.add('pressed');};
    const off=e=>{e.preventDefault();KEYS[key]=false;el.classList.remove('pressed');};
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('mousedown',on);
    el.addEventListener('mouseup',off);
    el.addEventListener('mouseleave',off);
  }
  hold('dbtn-l','ArrowLeft');
  hold('dbtn-r','ArrowRight');
  hold('dbtn-u','ArrowUp');
  hold('dbtn-d','ArrowDown');
  hold('rbtn-fire',' ');
  hold('rbtn-jump','w');
}
document.addEventListener('keydown',e=>{KEYS[e.key]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{KEYS[e.key]=false;});
setupTouch();

// ── GAME ───────────────────────────────────────────────────
const GW=LW,GH=LH;

const G={
  sc:0,hp:3,wave:1,state:'fight',tick:0,
  pl:null,bul:[],mon:[],drp:[],par:[],
  scd:0,trt:0,
  tR:[],coll:[],items:[],
  cust:null,ct:0,srv:false,sRes:null,sTmr:0,sOrd:[],
  clouds:[{x:5,y:2,sp:.05},{x:60,y:4,sp:.03},{x:110,y:1,sp:.07},{x:150,y:3,sp:.04}],
  hX:0,h2X:80,

  restart(){this.sc=0;this.hp=3;this.wave=1;ovl.style.display='none';this.initFight();},

  initFight(){
    this.state='fight';this.trt=0;
    ph.textContent='WAVE '+this.wave+' — ELIMINA!';ph.style.color='#FF8844';
    ib.innerHTML='';
    this.pl={x:GW/2-5,y:GH-16,vy:0,onG:true,face:1,wf:0,wt:0,hurt:0,sh:0};
    this.bul=[];this.drp=[];this.par=[];
    const n=3+this.wave;this.mon=[];
    for(let i=0;i<n;i++){
      const fi=i%FL.length;
      this.mon.push({
        x:5+Math.floor(Math.random()*(GW-20)),y:3+Math.floor(Math.random()*10),
        hp:2+(this.wave>2?1:0),mhp:2+(this.wave>2?1:0),
        vx:(Math.random()>.5?.25:-.25)*(1+this.wave*.1),vy:0,
        t:Math.random()*200,fi,type:Math.random()>.5?0:1,
        dead:false,hf:0,by:0,jt:40+Math.floor(Math.random()*60)
      });
    }
    hw.textContent=this.wave;
    this.showDpad(true);
  },

  initCollect(){
    this.state='collect';
    this.tR=RCP[Math.floor(Math.random()*RCP.length)].slice();
    this.coll=[];this.items=[];this.par=[];
    ph.textContent='TOCCA GLI INGREDIENTI!';ph.style.color='#FFD700';
    this.tR.forEach((fi,i)=>{
      this.items.push({x:10+Math.floor(i/this.tR.length*(GW-20)),y:8+Math.floor(Math.random()*14),fi,done:false,bt:Math.random()*60});
    });
    for(let d=0;d<3;d++){
      let fi;do{fi=Math.floor(Math.random()*FL.length);}while(this.tR.includes(fi));
      this.items.push({x:6+Math.floor(Math.random()*(GW-12)),y:5+Math.floor(Math.random()*18),fi,done:false,bt:Math.random()*60,bad:true});
    }
    this.updIB();this.showDpad(false);
  },

  initServe(){
    this.state='serve';this.srv=false;this.sRes=null;this.sTmr=0;
    this.ct=280;this.sOrd=[];
    this.cust={x:GW/2-5,y:GH/2-16,a:0};
    ph.textContent='SERVI IL CLIENTE!';ph.style.color='#44CC66';
    this.updIB();this.showDpad(false);
  },

  showDpad(show){
    const dp=$('dpad'),rb=$('rbtns');
    dp.style.display=show?'grid':'none';
    rb.style.display=show?'flex':'none';
  },

  updIB(){
    ib.innerHTML='';
    if(this.state==='collect'||this.state==='serve'){
      const l=document.createElement('span');l.className='il';
      l.textContent=this.state==='collect'?'RICETTA: ':'ORDINE: ';ib.appendChild(l);
      this.tR.forEach(fi=>{
        const f=FL[fi],got=this.coll.includes(fi);
        const b=document.createElement('span');b.className='it';
        b.textContent=EM[fi]+' '+f.n;
        b.style.cssText=`border-color:${f.c};color:${got?'#000':f.c};background:${got?f.c:'transparent'}`;
        if(this.state==='serve')b.addEventListener('touchend',e=>{e.preventDefault();this.srvClk(fi);},{passive:false});
        b.onclick=()=>this.srvClk(fi);
        ib.appendChild(b);
      });
    }
  },

  srvClk(fi){
    if(this.srv||this.state!=='serve')return;
    this.sOrd.push(fi);
    this.boom((this.cust.x+5)*1,(this.cust.y+6)*1,FL[fi].c,6);
    if(this.sOrd.length===this.tR.length){
      const ok=this.tR.every((f,i)=>this.sOrd[i]===f);
      this.sRes=ok;this.sTmr=150;this.srv=true;this.sOrd=[];
      if(ok){this.sc+=120*this.wave;this.boom((this.cust.x+5),(this.cust.y),FL[0].c,20,true);}
      else{this.hp=Math.max(0,this.hp-1);this.boom((this.cust.x+5),(this.cust.y),'#E84393',16,true);}
      this.sync();if(this.hp<=0)setTimeout(()=>this.over(false),300);
    }
  },

  sync(){
    hs.textContent=String(this.sc).padStart(6,'0');
    hh.textContent='♥'.repeat(Math.max(0,this.hp));
  },

  boom(x,y,c,n,big=false){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,sp=big?3+Math.random()*2:1.5+Math.random()*2;
      this.par.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,c,life:35+Math.random()*25,sz:big?2:1});
    }
  },

  update(){
    this.tick++;
    this.clouds.forEach(c=>{c.x-=c.sp;if(c.x<-16)c.x=GW+4;});
    this.hX=(this.hX+.02)%200;this.h2X=(this.h2X+.012)%250;
    this.par.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;});
    this.par=this.par.filter(p=>p.life>0);
    if(this.state==='fight')this.uFight();
    else if(this.state==='collect')this.uColl();
    else if(this.state==='serve')this.uServe();
    this.sync();
  },

  uFight(){
    const p=this.pl;
    if(KEYS['ArrowLeft']||KEYS['a']){p.x=Math.max(0,p.x-.5);p.face=-1;p.wt++;}
    else if(KEYS['ArrowRight']||KEYS['d']){p.x=Math.min(GW-10,p.x+.5);p.face=1;p.wt++;}
    else p.wt=0;
    if(p.wt>0&&this.tick%8===0)p.wf=(p.wf+1)%4;
    if((KEYS['ArrowUp']||KEYS['w'])&&p.onG){p.vy=-3;p.onG=false;}
    p.vy+=.16;p.y+=p.vy;
    const gr=GH-16;if(p.y>=gr){p.y=gr;p.vy=0;p.onG=true;}
    if(p.y<0){p.y=0;p.vy=0;}
    if(p.hurt>0)p.hurt--;if(p.sh>0)p.sh--;

    this.scd++;
    if(KEYS[' ']&&this.scd>14){
      this.scd=0;p.sh=8;
      this.bul.push({x:p.x+(p.face>0?10:0),y:p.y+3,vx:p.face*3.5,vy:-.8,life:45});
    }
    this.bul.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
    this.bul=this.bul.filter(b=>b.life>0&&b.y>-5&&b.x>-8&&b.x<GW+8);

    this.mon.forEach(m=>{
      if(m.dead)return;
      m.t++;m.x+=m.vx;m.by=Math.sin(m.t*.12)*.8;
      if(m.hf>0)m.hf--;
      if(m.x<2||m.x>GW-12)m.vx*=-1;
      m.jt--;if(m.jt<=0){m.vy=-2;m.jt=50+Math.floor(Math.random()*70);}
      m.vy+=.14;m.y+=m.vy;
      const mg=GH-16;if(m.y>mg){m.y=mg;m.vy=0;}if(m.y<0){m.y=0;m.vy=0;}

      this.bul.forEach(b=>{
        if(!b.hit&&b.x>m.x-1&&b.x<m.x+11&&b.y>m.y-1&&b.y<m.y+11){
          m.hp--;b.hit=true;m.hf=8;
          this.boom(m.x+5,m.y+5,FL[m.fi].c,8);
          if(m.hp<=0){
            m.dead=true;this.sc+=15;
            this.drp.push({x:m.x,y:m.y,fi:m.fi,bt:0});
            this.boom(m.x+5,m.y+4,FL[m.fi].c,18,true);
          }
        }
      });
      this.bul=this.bul.filter(b=>!b.hit);

      if(p.hurt===0&&p.x+9>m.x&&p.x<m.x+10&&p.y+14>m.y&&p.y<m.y+10){
        m.dead=true;this.hp=Math.max(0,this.hp-1);p.hurt=60;
        this.boom(p.x+5,p.y+7,'#FF4477',14,true);p.vy=-2;
        if(this.hp<=0)setTimeout(()=>this.over(false),400);
      }
    });
    this.drp.forEach(d=>{d.bt++;});

    if(!this.mon.some(m=>!m.dead)){
      this.trt++;
      if(this.trt>70){this.wave++;setTimeout(()=>this.wave>3?this.initCollect():this.initFight(),400);}
    }
  },

  uColl(){this.items.forEach(i=>{i.bt++;});},

  uServe(){
    if(this.cust)this.cust.a++;
    if(!this.srv){
      this.ct--;
      if(this.ct<=0){
        this.hp=Math.max(0,this.hp-1);this.sRes=false;this.srv=true;this.sTmr=110;
        this.boom(this.cust.x+5,this.cust.y+6,'#E84393',18,true);
        if(this.hp<=0)setTimeout(()=>this.over(false),300);
      }
    }
    if(this.srv&&this.sTmr>0){
      this.sTmr--;
      if(this.sTmr===0){
        if(this.sRes&&this.hp>0){this.wave++;this.wave>4?this.over(true):this.initFight();}
        else if(this.hp>0)this.initFight();
      }
    }
  },

  over(win){
    ovl.style.display='flex';
    $('ot').textContent=win?'HAI VINTO! 🍦':'GAME OVER';
    $('ot').style.color=win?'#44DD88':'#FF4477';
    $('om').textContent=(win?'Gelateria aperta! ':'Ritenta! ')+'Score: '+this.sc;
  },

  // ── DRAW ─────────────────────────────────────────────────
  draw(){
    X.clearRect(0,0,LW,LH);
    this.dBG();
    if(this.state==='fight'){
      this.dDrops();this.dBul();this.dMon();this.dPlayer();this.dTrans();
    }else if(this.state==='collect'){
      this.dItems();
    }else if(this.state==='serve'){
      this.dCust();this.dSrvRes();
    }
    this.dPar();
  },

  dBG(){
    // sky
    X.fillStyle='#5599EE';X.fillRect(0,0,LW,LH*.55);
    X.fillStyle='#77AAFF';X.fillRect(0,LH*.35,LW,LH*.3);
    X.fillStyle='#AACCFF';X.fillRect(0,LH*.55,LW,LH*.15);

    // back hills
    X.fillStyle='#4466BB';
    for(let i=0;i<3;i++){const hx=((i*80+this.hX*10))%220-40;X.beginPath();X.arc(hx,LH-8,40,Math.PI,0);X.fill();}
    X.fillStyle='#3B6D11';
    for(let i=0;i<4;i++){const hx=((i*70+20+this.h2X*8))%260-30;X.beginPath();X.arc(hx,LH-6,30,Math.PI,0);X.fill();}

    // clouds
    this.clouds.forEach(c=>blit(CLD,Math.floor(c.x),Math.floor(c.y)));

    // bushes
    [4,30,60,92,126].forEach(bx=>blit(BSH,bx,GH-9));

    // pipes
    blit(PP,18,GH-10);blit(PP,55,GH-10);blit(PP,100,GH-10);

    // coin blocks
    [12,14,35,37,72,74].forEach(bx=>blit(CB,bx,GH-13));

    // ground
    X.fillStyle='#4aaa22';X.fillRect(0,LH-5,LW,2);
    X.fillStyle='#388810';X.fillRect(0,LH-3,LW,1);
    for(let tx=0;tx<GW;tx+=6){
      X.fillStyle=Math.floor(tx/6)%2===0?'#D85010':'#C04008';
      X.fillRect(tx,LH-2,6,2);
      X.fillStyle='rgba(0,0,0,.15)';X.fillRect(tx,LH-2,1,2);X.fillRect(tx,LH-2,6,0.5);
    }
    X.fillStyle='#882800';X.fillRect(0,LH-1,LW,1);
  },

  dPlayer(){
    const p=this.pl;if(!p)return;
    if(p.hurt>0&&Math.floor(this.tick/4)%2===0)return;
    X.fillStyle='rgba(0,0,0,.15)';
    X.beginPath();X.ellipse(p.x+5,GH-4,5,1.5,0,0,Math.PI*2);X.fill();
    blit(NK,Math.round(p.x),Math.round(p.y),p.face<0);
    if(p.wt>0){
      const wo=p.wf%2===0?0:1;
      X.fillStyle='#7a808a';
      X.fillRect(Math.round(p.x)+1+wo,Math.round(p.y)+12,3,1);
      X.fillRect(Math.round(p.x)+5-wo,Math.round(p.y)+12,3,1);
    }
    if(p.sh>0){
      X.fillStyle='rgba(255,224,80,.35)';
      const fx=p.face>0?p.x+11:p.x-4;
      X.beginPath();X.arc(fx,p.y+3,3,0,Math.PI*2);X.fill();
    }
  },

  dMon(){
    this.mon.forEach(m=>{
      if(m.dead)return;
      const f=FL[m.fi];
      const sp=mkE(m.type===0?BL_R:SK_R,f.c,f.h,m.hf>0);
      const my2=Math.round(m.y+m.by);
      X.fillStyle='rgba(0,0,0,.15)';
      X.beginPath();X.ellipse(m.x+5,GH-4,5,1.5,0,0,Math.PI*2);X.fill();
      blit(sp,Math.round(m.x),my2,m.vx<0);
      X.fillStyle='#fff';X.fillRect(m.x+2,my2+2,2,2);X.fillRect(m.x+6,my2+2,2,2);
      X.fillStyle=m.hf>0?f.c:'#222';X.fillRect(m.x+2,my2+2,1,1);X.fillRect(m.x+7,my2+2,1,1);
      const bw=10;
      X.fillStyle='#111';X.fillRect(m.x,m.y-2,bw,2);
      X.fillStyle=m.hp/m.mhp>.6?'#44CC44':m.hp/m.mhp>.3?'#EE9900':'#EE2244';
      X.fillRect(m.x,m.y-2,bw*m.hp/m.mhp,2);
    });
  },

  dBul(){
    this.bul.forEach(b=>{
      X.fillStyle='rgba(255,224,0,.2)';
      X.beginPath();X.arc(b.x+1,b.y+2,3,0,Math.PI*2);X.fill();
      blit(BUL,Math.round(b.x),Math.round(b.y));
    });
  },

  dDrops(){
    this.drp.forEach(d=>{
      const f=FL[d.fi];const bob=Math.sin(d.bt*.1)*1;
      X.fillStyle=f.c+'22';X.beginPath();X.arc(d.x+3,d.y+4+bob,6,0,Math.PI*2);X.fill();
      blit(mkScoop(f.c,f.h),Math.round(d.x),Math.round(d.y+bob));
    });
  },

  dItems(){
    X.fillStyle='rgba(0,20,40,.06)';
    for(let y=0;y<LH;y+=3)X.fillRect(0,y,LW,1);

    this.items.forEach(item=>{
      if(item.done)return;
      const f=FL[item.fi];const bob=Math.sin(item.bt*.07)*1.5;
      const ix=Math.round(item.x),iy=Math.round(item.y+bob);
      X.strokeStyle=item.bad?'#FF2255':f.c;
      X.lineWidth=1;X.globalAlpha=.5+Math.sin(item.bt*.08)*.3;
      X.beginPath();X.arc(ix+3,iy+4,6,0,Math.PI*2);X.stroke();
      X.globalAlpha=1;
      blit(mkScoop(f.c,f.h),ix,iy);
      if(item.bad){X.fillStyle='#FF2255';X.font='bold 5px Courier New';X.textAlign='center';X.fillText('NO',ix+3,iy-1);}
      X.fillStyle='#FFD700';X.font='bold 4px Courier New';X.textAlign='center';X.fillText(f.n,ix+3,iy+11);
    });
    X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,LH-10,LW,10);
    X.fillStyle='#998855';X.font='4px Courier New';X.textAlign='center';
    X.fillText('TOCCA gli ingredienti giusti — evita le trappole NO',LW/2,LH-4);
  },

  dCust(){
    if(!this.cust)return;
    const cx=this.cust.x,cy=this.cust.y;
    const bob=Math.sin(this.cust.a*.09)*.8;
    X.fillStyle='rgba(0,0,0,.18)';X.beginPath();X.ellipse(cx+5,GH-4,7,2,0,0,Math.PI*2);X.fill();
    blit(CU,Math.round(cx),Math.round(cy+bob));
    if(!this.srv){
      const bx=cx-2,by=cy-9,bw2=16,bh2=7;
      X.fillStyle='#fffef0';X.strokeStyle='#ddd';X.lineWidth=0.5;
      X.fillRect(bx,by,bw2,bh2);X.strokeRect(bx,by,bw2,bh2);
      X.fillStyle='#222';X.font='bold 5px Courier New';X.textAlign='center';
      X.fillText(this.tR.map(fi=>EM[fi]).join('+'),cx+6,by+bh2-1.5);
      X.fillStyle='#fffef0';X.fillRect(cx+4,by+bh2-1,3,2);
    }
    const tw=18;
    X.fillStyle='#222';X.fillRect(cx-1,cy+14,tw,1.5);
    X.fillStyle=this.ct>200?'#44CC66':this.ct>100?'#EE9900':'#EE2244';
    X.fillRect(cx-1,cy+14,tw*(this.ct/280),1.5);
  },

  dSrvRes(){
    if(this.srv&&this.sTmr>50){
      X.fillStyle='rgba(0,0,0,.78)';X.fillRect(0,LH/2-14,LW,28);
      X.fillStyle=this.sRes?'#44DD88':'#FF4477';
      X.font='bold 7px Courier New';X.textAlign='center';
      X.fillText(this.sRes?'PERFETTO! +'+120*this.wave+' pts':'SBAGLIATO! -1 vita',LW/2,LH/2+3);
    }
  },

  dTrans(){
    if(this.trt>0&&!this.mon.some(m=>!m.dead)){
      X.fillStyle='rgba(0,0,0,.72)';X.fillRect(0,LH/2-12,LW,24);
      X.fillStyle='#FFD700';X.font='bold 7px Courier New';X.textAlign='center';
      X.fillText('★ ONDA COMPLETATA! ★',LW/2,LH/2+3);
    }
  },

  dPar(){
    this.par.forEach(p=>{
      X.globalAlpha=Math.max(0,p.life/50);
      X.fillStyle=p.c;X.fillRect(p.x,p.y,p.sz,p.sz);
    });
    X.globalAlpha=1;
  }
};

// Touch on canvas for collect phase
CV.addEventListener('touchend',e=>{
  e.preventDefault();
  if(G.state!=='collect')return;
  const r=CV.getBoundingClientRect();
  const scaleX=LW/r.width,scaleY=LH/r.height;
  const t=e.changedTouches[0];
  const cx=(t.clientX-r.left)*scaleX,cy=(t.clientY-r.top)*scaleY;
  G.items.forEach(item=>{
    if(item.done)return;
    const bob=Math.sin(item.bt*.07)*1.5;
    if(Math.abs(cx-(item.x+3))<7&&Math.abs(cy-(item.y+4+bob))<7){
      item.done=true;
      if(!item.bad){
        G.coll.push(item.fi);G.boom(item.x+3,item.y+4,FL[item.fi].c,10,true);
        G.updIB();
        if(G.coll.length===G.tR.length){
          const ok=G.tR.every(fi=>G.coll.includes(fi));
          ok?setTimeout(()=>G.initServe(),500):(G.coll=[],G.updIB());
        }
      }else{
        G.boom(item.x+3,item.y+4,'#FF2255',12,true);
        G.hp=Math.max(0,G.hp-1);if(G.hp<=0)G.over(false);
      }
    }
  });
},{passive:false});

CV.addEventListener('click',e=>{
  if(G.state!=='collect')return;
  const r=CV.getBoundingClientRect();
  const cx=(e.clientX-r.left)*LW/r.width,cy=(e.clientY-r.top)*LH/r.height;
  G.items.forEach(item=>{
    if(item.done)return;
    const bob=Math.sin(item.bt*.07)*1.5;
    if(Math.abs(cx-(item.x+3))<7&&Math.abs(cy-(item.y+4+bob))<7){
      item.done=true;
      if(!item.bad){
        G.coll.push(item.fi);G.boom(item.x+3,item.y+4,FL[item.fi].c,10,true);
        G.updIB();
        if(G.coll.length===G.tR.length){
          const ok=G.tR.every(fi=>G.coll.includes(fi));
          ok?setTimeout(()=>G.initServe(),500):(G.coll=[],G.updIB());
        }
      }else{
        G.boom(item.x+3,item.y+4,'#FF2255',12,true);
        G.hp=Math.max(0,G.hp-1);if(G.hp<=0)G.over(false);
      }
    }
  });
});

function loop(){G.update();G.draw();requestAnimationFrame(loop);}
G.restart();
resizeCV();
loop();
</script>
