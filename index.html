<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>Gelato Bros v4</title>
<style>
:root{--gold:#FFD700;--pink:#FF3D8A;--green:#3DCA6E;--dark:#0a0a1a;--hud:#12121f}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'Courier New',monospace}

/* ── ROTATE OVERLAY ── */
#rotate{
  display:none;position:fixed;inset:0;z-index:999;
  background:#0a0a1a;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
}
#rotate .ico{font-size:60px;animation:tilt 1.4s ease-in-out infinite alternate}
@keyframes tilt{from{transform:rotate(-18deg)}to{transform:rotate(18deg)}}
#rotate .msg{font-size:13px;color:var(--gold);letter-spacing:2px;text-align:center;line-height:1.9;text-transform:uppercase}
#rotate .sub{font-size:9px;color:#444;letter-spacing:1px}

/* ── APP SHELL ── */
#app{width:100%;height:100svh;display:flex;flex-direction:column;overflow:hidden}

/* HUD — top strip */
#hud{
  background:var(--hud);border-bottom:2px solid var(--gold);
  height:34px;flex-shrink:0;display:flex;align-items:center;padding:0 6px;
}
.hs{display:flex;align-items:center;gap:3px;padding:0 8px;height:100%;border-right:1px solid #1e1e2e}
.hs:last-child{border-right:none;flex:1}
.hl{font-size:7px;color:#444;letter-spacing:1.5px;text-transform:uppercase}
.hv{font-size:12px;font-weight:900;letter-spacing:2px;color:var(--gold)}
.hv.r{color:var(--pink)}.hv.g{color:var(--green)}
#hph{font-size:8px;color:#666;letter-spacing:1px;padding-left:6px}
#hver{font-size:7px;color:#2a2a3a;margin-left:auto;padding-right:4px;letter-spacing:1px}

/* CANVAS AREA — fills all space between HUD and controls */
#gamearea{flex:1;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;min-height:0}
#cv{display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* RECIPE BAR */
#rb{
  background:#0c0c1a;border-top:1px solid #1a1a2e;
  flex-shrink:0;min-height:32px;
  display:flex;align-items:center;padding:3px 8px;gap:5px;flex-wrap:wrap;
}
.rlbl{font-size:7px;color:#444;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.rtag{
  font-size:9px;font-weight:bold;padding:3px 10px;
  border:2px solid;border-radius:14px;cursor:pointer;
  letter-spacing:.3px;transition:all .08s;white-space:nowrap;
}
.rtag:active{transform:scale(.9)}

/* ── CONTROLS — bottom bar, always visible ── */
#ctrl{
  background:#0d0d1c;border-top:2px solid #1a1a2e;
  flex-shrink:0;height:100px;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;gap:0;
}
#ctrl.hidden{display:none}

/* D-PAD — left side */
#dpad{
  display:grid;
  grid-template-columns:48px 48px 48px;
  grid-template-rows:48px 48px;
  gap:4px;
}
.dpb{
  width:48px;height:48px;
  background:rgba(255,215,0,.08);border:2px solid rgba(255,215,0,.18);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:22px;color:rgba(255,215,0,.4);transition:all .07s;
}
.dpb:active,.dpb.on{background:rgba(255,215,0,.28);border-color:rgba(255,215,0,.7);color:var(--gold);transform:scale(.93)}
/* layout: row1 = [empty, UP, empty], row2 = [LEFT, empty, RIGHT] */
#dp-u{grid-column:2;grid-row:1}
#dp-l{grid-column:1;grid-row:2}
#dp-r{grid-column:3;grid-row:2}

/* ACTION BUTTONS — right side */
#abtns{display:flex;align-items:center;gap:12px}
.abtn{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;letter-spacing:.3px;
  border:3px solid;transition:all .07s;line-height:1.2;text-align:center;
}
.abtn:active,.abtn.on{transform:scale(.88);filter:brightness(1.6)}
#ab-jump{width:62px;height:62px;background:rgba(61,202,110,.12);border-color:rgba(61,202,110,.35);color:rgba(100,220,140,.7)}
#ab-fire{width:52px;height:52px;background:rgba(255,61,138,.12);border-color:rgba(255,61,138,.35);color:rgba(255,100,160,.7)}
#ab-jump:active,#ab-jump.on{background:rgba(61,202,110,.45);color:#fff;border-color:var(--green)}
#ab-fire:active,#ab-fire.on{background:rgba(255,61,138,.45);color:#fff;border-color:var(--pink)}

/* OVERLAY */
#ovl{
  position:absolute;inset:0;background:rgba(0,0,0,.93);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:50;
}
.ologо{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:4px}
.osub{font-size:9px;color:#444;letter-spacing:2px;margin-top:-6px}
#ot{font-size:18px;font-weight:900;letter-spacing:3px}
.omsg{font-size:11px;color:#666;letter-spacing:1px;text-align:center}
.obtn{
  font-size:12px;font-weight:900;background:var(--pink);color:#fff;
  border:3px solid var(--gold);padding:12px 32px;cursor:pointer;
  letter-spacing:3px;border-radius:4px;
}
.obtn:active{background:var(--gold);color:#000}
</style>
</head>
<body>

<!-- ROTATE PROMPT -->
<div id="rotate">
  <div class="ico">📱</div>
  <p class="msg">Gira il telefono<br>in orizzontale</p>
  <p class="sub">Gelato Bros v4 richiede modalità landscape</p>
</div>

<!-- APP -->
<div id="app">
  <div id="hud">
    <div class="hs"><span class="hl">SCORE</span><span class="hv" id="hsc">000000</span></div>
    <div class="hs"><span class="hl">VITE</span><span class="hv r" id="hlv">♥♥♥</span></div>
    <div class="hs"><span class="hl">WAVE</span><span class="hv g" id="hwv">1</span></div>
    <div class="hs"><span id="hph">WAVE 1 — ELIMINA!</span></div>
    <span id="hver">v4</span>
  </div>

  <div id="gamearea"><canvas id="cv"></canvas></div>

  <div id="rb"></div>

  <!-- CONTROLS BOTTOM BAR -->
  <div id="ctrl">
    <div id="dpad">
      <div class="dpb" id="dp-u">▲</div>
      <div class="dpb" id="dp-l">◀</div>
      <div style="width:48px"></div><!-- center spacer -->
      <div class="dpb" id="dp-r">▶</div>
    </div>
    <div id="abtns">
      <div class="abtn" id="ab-jump">SALTA</div>
      <div class="abtn" id="ab-fire">SPARA</div>
    </div>
  </div>

  <div id="ovl">
    <div class="ologо">🍦 GELATO BROS</div>
    <div class="osub">IL GELATAIO DI URBINO — v4</div>
    <h2 id="ot" style="color:var(--pink)">GAME OVER</h2>
    <p class="omsg" id="om">Score: 0</p>
    <button class="obtn" id="ob">▶ RIGIOCA</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  GELATO BROS  v4
// ═══════════════════════════════════════
const VER = 4;

const CV = document.getElementById('cv');
const X  = CV.getContext('2d');
const LW = 240, LH = 130; // landscape logical size
CV.width = LW; CV.height = LH;

const $ = id => document.getElementById(id);

// ── RESIZE ──
function resizeCV(){
  const a = $('gamearea');
  const s = Math.min(a.clientWidth/LW, a.clientHeight/LH);
  CV.style.width  = Math.floor(LW*s)+'px';
  CV.style.height = Math.floor(LH*s)+'px';
}
window.addEventListener('resize', ()=>{ checkOri(); resizeCV(); });
setTimeout(resizeCV, 60);

// ── ORIENTATION ──
function checkOri(){
  const p = window.innerHeight > window.innerWidth;
  $('rotate').style.display = p ? 'flex' : 'none';
  $('app').style.display    = p ? 'none' : 'flex';
}
checkOri();

// ── SPRITE ENGINE ──
function mkS(rows,pal){ return rows.map(r=>[...r].map(c=>pal[c]||null)); }
function blit(sp,px,py,flip=false){
  const W=sp[0].length;
  sp.forEach((row,r)=>row.forEach((c,col)=>{
    if(!c)return;
    X.fillStyle=c;
    X.fillRect(px+(flip?W-1-col:col), py+r, 1, 1);
  }));
}

// ── SPRITES ──

// NIKOLAS HERO 12×16
const NK=mkS([
  '..CCCCCCCC..','..CCCCCCCCc.','KKKKKKKKKKKk',
  'KkkkkkkkkkKk','..FFFFFFFFF.','.FFFEEFFfFF.',
  'FFFFFFFbFFF.','.FBBBBBBBBf.','FBBBBBBBBBf.',
  '.MMMMMMMMMM.','MMMMMMMMMMM.','MmMMMMMMMmM.',
  '.MMMMMMMMMM.','.yMM....MMy.','..MM....MM..',
  '............'
],{C:'#9aA0A8',c:'#6a7078',K:'#545c64',k:'#44505a',
   F:'#D4A574',f:'#B08050',E:'#88C4E8',b:'#3a2510',B:'#6a4a28',
   M:'#7a8090',m:'#606878',y:'#4a5868','.':null});

// BLOB 10×10
const BL=[
  '..EEEEEE..', '.EEEEEEEE.',
  'EEeEEEeEEE', 'EE.EE.EEEE',
  'EEEEmmEEEE', '.EEmmmEEE.',
  '..EEEEEE..', '...EEEE...',
  '..........', '..........'];
// SPIKE 10×10
const SK=[
  '.E......E.', 'EEE....EEE',
  'EEEEEEEEEE', 'EEeEEEeEEE',
  'EEEEmmEEEE', '.EEmmmEEE.',
  '..EEEEEE..', '...EEEE...',
  '..........', '..........'];
function mkE(rows,col,hi,hurt){
  return mkS(rows,{E:hurt?'#fff':col,e:hi,m:'#111','.':null});
}

// BULLET 3×5
const BUL=mkS(['.Y.','YYY','.Y.','.Y.','.Y.'],{Y:'#FFE050','.':null});

// SCOOP 8×9
function mkScoop(col,hi){
  return mkS([
    '..CCCC..', '.CChCCC.','CCCCCCCC',
    'CCCCCCCC', '.CCCCCC.','..CCCC..',
    '..WWWW..', '...WW...','...WW...'
  ],{C:col,h:hi,W:'#F0E8D0','.':null});
}

// COIN BLOCK 6×6
const CB=mkS(['AAAAAA','A.QQ.A','A.QQ.A','A.QQ.A','A....A','AAAAAA'],
  {A:'#C88000',Q:'#FFD700','.':null});
// PIPE 8×7
const PIPE=mkS([
  '........', '.GGGGGG.','GGGGGGGG',
  'GGGGGGGG', '.GG..GG.','.GG..GG.','.GG..GG.'],
  {G:'#1D9E75','.':null});
// CLOUD 16×6
const CLD=mkS([
  '....WWWWWWWW....','..WWWWWWWWWWWW..',
  '.WWwWWWWWWWWWWW.','.WWWWWWWWWWWWWW.',
  '..WWWWWWWWWWWW..','....WWWWWWWW....'],
  {W:'#fff',w:'#eee','.':null});
// BUSH 10×5
const BUSH=mkS([
  '...BBBB...','..BBBBBB..',
  '.BBBBbBBBB','BBBBbbBBBB','.BBBBBBBB.'],
  {B:'#2d6612',b:'#1a4008','.':null});
// CUSTOMER 10×13
const CUST=mkS([
  '..OOOOOO..', '.OOhhOOOO.',
  '..OOOOoOO.', '.OOOOOOOO.',
  '..OoOOoOO.', '.OOOOOOOO.',
  '.RRRRRRRR.', 'RRRRRRRRRR',
  'RRrRRRrRRR', 'RRRRRRRRRR',
  '.RRRR.RRRR', '.RRR...RRR','..........'],
  {O:'#E8C090',o:'#C09060',h:'#4a2a1a',R:'#E84393',r:'#C02060','.':null});

// ── FLAVORS ──
const FL=[
  {n:'Cioccolato',c:'#7B4F2E',h:'#AA7050'},
  {n:'Fragola',   c:'#E84393',h:'#FF80C0'},
  {n:'Pistacchio',c:'#5BAF2C',h:'#8FD050'},
  {n:'Limone',    c:'#F0D000',h:'#FFE840'},
  {n:'Panna',     c:'#F5ECD7',h:'#FFFFFF'},
];
const EM=['🍫','🍓','🌿','🍋','🥛'];
const RCP=[[0,1],[2,3],[0,4],[1,4],[0,1,2]];

// ── INPUT ──
const KEYS={};
document.addEventListener('keydown',e=>{KEYS[e.key]=true; if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',  e=>KEYS[e.key]=false);

function holdBtn(id,key){
  const el=$(id); if(!el)return;
  const on =e=>{e.preventDefault();KEYS[key]=true; el.classList.add('on');};
  const off=e=>{e.preventDefault();KEYS[key]=false;el.classList.remove('on');};
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend',   off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
holdBtn('dp-l','ArrowLeft'); holdBtn('dp-r','ArrowRight'); holdBtn('dp-u','ArrowUp');
holdBtn('ab-fire',' ');      holdBtn('ab-jump','w');

// ── PARTICLES ──
let PARTS=[];
function boom(x,y,col,n,big=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=big?3+Math.random()*2.5:1.5+Math.random()*2;
    PARTS.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,col,life:38+Math.random()*28,sz:big?2:1});
  }
}

function showCtrl(v){ $('ctrl').classList.toggle('hidden',!v); }

// ── GAME ──
const G={
  sc:0,hp:3,wave:1,state:'init',tick:0,
  pl:null,buls:[],mons:[],drps:[],
  scd:0,transT:0,_waveCleared:false,
  tR:[],collected:[],items:[],
  cust:null,custT:0,serving:false,sResult:null,sTimer:0,sOrder:[],
  clouds:[{x:8,y:3,sp:.03},{x:85,y:6,sp:.018},{x:165,y:2,sp:.045}],
  hX:0,h2X:90,

  syncHUD(){
    $('hsc').textContent=String(this.sc).padStart(6,'0');
    $('hlv').textContent='♥'.repeat(Math.max(0,this.hp));
    $('hwv').textContent=this.wave;
  },

  initFight(){
    this.state='fight'; this.transT=0; this._waveCleared=false;
    $('hph').textContent='WAVE '+this.wave+' — ELIMINA!';
    $('hph').style.color='#FF8844';
    $('rb').innerHTML='';
    showCtrl(true);
    this.pl={x:LW/2-6,y:LH-26,vy:0,onG:true,face:1,wf:0,wt:0,hurt:0,sh:0};
    this.buls=[]; this.drps=[]; PARTS=[];
    const cnt=3+this.wave; this.mons=[];
    for(let i=0;i<cnt;i++){
      const fi=i%FL.length;
      this.mons.push({
        x:8+Math.floor(Math.random()*(LW-24)),
        y:8+Math.floor(Math.random()*28),
        hp:2+(this.wave>2?1:0), mhp:2+(this.wave>2?1:0),
        vx:(Math.random()>.5?.38:-.38)*(1+this.wave*.1),
        vy:0, t:Math.random()*200,
        fi, type:Math.random()>.5?0:1,
        dead:false, hf:0, by:0, jt:45+Math.floor(Math.random()*80)
      });
    }
  },

  initCollect(){
    this.state='collect';
    this.tR=RCP[Math.floor(Math.random()*RCP.length)].slice();
    this.collected=[]; this.items=[]; PARTS=[];
    $('hph').textContent='RACCOGLI GLI INGREDIENTI!';
    $('hph').style.color='#FFD700';
    showCtrl(false);
    this.tR.forEach((fi,i)=>{
      this.items.push({
        x:12+Math.floor(i/this.tR.length*(LW-24)),
        y:12+Math.floor(Math.random()*(LH-45)),
        fi, done:false, bt:Math.random()*60
      });
    });
    for(let d=0;d<3;d++){
      let fi; do{fi=Math.floor(Math.random()*FL.length);}while(this.tR.includes(fi));
      this.items.push({
        x:8+Math.floor(Math.random()*(LW-16)),
        y:10+Math.floor(Math.random()*(LH-42)),
        fi, done:false, bt:Math.random()*60, bad:true
      });
    }
    this.updRB();
  },

  initServe(){
    this.state='serve';
    this.serving=false; this.sResult=null; this.sTimer=0;
    this.custT=300; this.sOrder=[];
    this.cust={x:LW/2-5,y:LH/2-20,a:0};
    $('hph').textContent='SERVI IL CLIENTE!';
    $('hph').style.color='#3DCA6E';
    showCtrl(false);
    this.updRB();
  },

  updRB(){
    const rb=$('rb'); rb.innerHTML='';
    if(this.state!=='collect'&&this.state!=='serve') return;
    const l=document.createElement('span'); l.className='rlbl';
    l.textContent=this.state==='collect'?'RICETTA: ':'ORDINE: ';
    rb.appendChild(l);
    this.tR.forEach(fi=>{
      const f=FL[fi], got=this.collected.includes(fi);
      const b=document.createElement('div'); b.className='rtag';
      b.textContent=EM[fi]+' '+f.n;
      b.style.cssText=`border-color:${f.c};color:${got?'#000':f.c};background:${got?f.c:'transparent'}`;
      if(this.state==='serve'){
        b.addEventListener('touchend',e=>{e.preventDefault();this.serveClick(fi);},{passive:false});
        b.addEventListener('click',()=>this.serveClick(fi));
      }
      rb.appendChild(b);
    });
  },

  serveClick(fi){
    if(this.serving||this.state!=='serve') return;
    this.sOrder.push(fi);
    boom(this.cust.x+5,this.cust.y+6,FL[fi].c,8);
    if(this.sOrder.length===this.tR.length){
      const ok=this.tR.every((f,i)=>this.sOrder[i]===f);
      this.sResult=ok; this.sTimer=150; this.serving=true; this.sOrder=[];
      if(ok){this.sc+=150*this.wave; boom(this.cust.x+5,this.cust.y,'#FFD700',28,true);}
      else  {this.hp=Math.max(0,this.hp-1); boom(this.cust.x+5,this.cust.y,'#FF3D8A',20,true);}
      this.syncHUD();
      if(this.hp<=0) setTimeout(()=>this.gameOver(false),400);
    }
  },

  update(){
    this.tick++;
    this.clouds.forEach(c=>{c.x-=c.sp; if(c.x<-18)c.x=LW+4;});
    this.hX=(this.hX+.01)%280; this.h2X=(this.h2X+.006)%360;
    PARTS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.life--;});
    PARTS=PARTS.filter(p=>p.life>0);
    if     (this.state==='fight')   this.uFight();
    else if(this.state==='collect') this.items.forEach(i=>i.bt++);
    else if(this.state==='serve')   this.uServe();
    this.syncHUD();
  },

  uFight(){
    const p=this.pl;
    if(KEYS['ArrowLeft']||KEYS['a']) {p.x=Math.max(0,p.x-.55);p.face=-1;p.wt++;}
    else if(KEYS['ArrowRight']||KEYS['d']){p.x=Math.min(LW-12,p.x+.55);p.face=1;p.wt++;}
    else p.wt=0;
    if(p.wt>0&&this.tick%10===0) p.wf=(p.wf+1)%4;
    if((KEYS['ArrowUp']||KEYS['w'])&&p.onG){p.vy=-3;p.onG=false;}
    p.vy+=.17; p.y+=p.vy;
    const gr=LH-26;
    if(p.y>=gr){p.y=gr;p.vy=0;p.onG=true;}
    if(p.y<0)  {p.y=0;p.vy=0;}
    if(p.hurt>0)p.hurt--;
    if(p.sh>0)  p.sh--;

    this.scd++;
    if(KEYS[' ']&&this.scd>14){
      this.scd=0; p.sh=8;
      this.buls.push({x:p.x+(p.face>0?12:0),y:p.y+4,vx:p.face*4,vy:-.8,life:52});
      boom(p.x+6,p.y+3,'#FFE050',4);
    }
    this.buls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
    this.buls=this.buls.filter(b=>b.life>0&&b.y>-6&&b.x>-8&&b.x<LW+8);

    this.mons.forEach(m=>{
      if(m.dead)return;
      m.t++; m.x+=m.vx; m.by=Math.sin(m.t*.13)*.8;
      if(m.hf>0)m.hf--;
      if(m.x<2||m.x>LW-12)m.vx*=-1;
      m.jt--; if(m.jt<=0){m.vy=-2.1;m.jt=50+Math.floor(Math.random()*80);}
      m.vy+=.15; m.y+=m.vy;
      const mg=LH-26;
      if(m.y>mg){m.y=mg;m.vy=0;} if(m.y<0){m.y=0;m.vy=0;}

      this.buls.forEach(b=>{
        if(!b.hit&&b.x>m.x-1&&b.x<m.x+11&&b.y>m.y-1&&b.y<m.y+11){
          m.hp--; b.hit=true; m.hf=10;
          boom(m.x+5,m.y+5,FL[m.fi].c,10);
          if(m.hp<=0){
            m.dead=true; this.sc+=15;
            this.drps.push({x:m.x,y:m.y,fi:m.fi,bt:0});
            boom(m.x+5,m.y+4,FL[m.fi].c,22,true);
          }
        }
      });
      this.buls=this.buls.filter(b=>!b.hit);

      if(p.hurt===0&&p.x+10>m.x&&p.x<m.x+10&&p.y+16>m.y&&p.y<m.y+10){
        m.dead=true; this.hp=Math.max(0,this.hp-1); p.hurt=70;
        boom(p.x+6,p.y+8,'#FF3D8A',16,true); p.vy=-2.3;
        if(this.hp<=0)setTimeout(()=>this.gameOver(false),400);
      }
    });
    this.drps.forEach(d=>d.bt++);

    if(!this._waveCleared&&this.mons.length>0&&this.mons.every(m=>m.dead)){
      this._waveCleared=true;
      this.transT=1;
      setTimeout(()=>{
        this.transT=0;
        this.wave++;
        if(this.wave>3) this.initCollect();
        else            this.initFight();
      },1600);
    }
  },

  uServe(){
    if(this.cust)this.cust.a++;
    if(!this.serving){
      this.custT--;
      if(this.custT<=0){
        this.hp=Math.max(0,this.hp-1);
        this.sResult=false; this.serving=true; this.sTimer=120;
        boom(this.cust.x+5,this.cust.y+6,'#FF3D8A',20,true);
        if(this.hp<=0)setTimeout(()=>this.gameOver(false),400);
      }
    }
    if(this.serving&&this.sTimer>0){
      this.sTimer--;
      if(this.sTimer===0){
        if(this.sResult&&this.hp>0){this.wave++;this.wave>4?this.gameOver(true):this.initFight();}
        else if(this.hp>0) this.initFight();
      }
    }
  },

  gameOver(win){
    this.state='over';
    $('ovl').style.display='flex';
    $('ot').textContent=win?'🍦 HAI VINTO!':'GAME OVER';
    $('ot').style.color=win?'#3DCA6E':'#FF3D8A';
    $('om').textContent=(win?'Gelateria aperta! ':'Ritenta gelataio! ')+'Score: '+this.sc;
  },

  restart(){
    this.sc=0;this.hp=3;this.wave=1;this._waveCleared=false;
    PARTS=[]; $('ovl').style.display='none';
    this.initFight();
  },

  // ── DRAW ──
  draw(){
    X.clearRect(0,0,LW,LH);
    this.dBG();
    if(this.state==='fight'){
      this.dDrops(); this.dBuls(); this.dMons(); this.dPlayer(); this.dTrans();
    } else if(this.state==='collect'){
      this.dItems();
    } else if(this.state==='serve'){
      this.dCust(); this.dServeRes();
    }
    this.dParts();
  },

  dBG(){
    X.fillStyle='#3A7FD5'; X.fillRect(0,0,LW,LH*.45);
    X.fillStyle='#5594E8'; X.fillRect(0,LH*.28,LW,LH*.22);
    X.fillStyle='#78AAEE'; X.fillRect(0,LH*.46,LW,LH*.2);
    X.fillStyle='#9ABFF5'; X.fillRect(0,LH*.62,LW,LH*.1);
    // mountains back
    X.fillStyle='#3A5080';
    for(let i=0;i<5;i++){
      const mx=((i*70+this.hX*14))%(LW+60)-30;
      X.beginPath();X.moveTo(mx,LH-16);X.lineTo(mx+18,LH-16-22);X.lineTo(mx+36,LH-16);X.closePath();X.fill();
    }
    X.fillStyle='#CDD8F0';
    for(let i=0;i<5;i++){
      const mx=((i*70+this.hX*14))%(LW+60)-30;
      X.beginPath();X.moveTo(mx+12,LH-16-19);X.lineTo(mx+18,LH-16-22);X.lineTo(mx+24,LH-16-19);X.closePath();X.fill();
    }
    // hills mid
    X.fillStyle='#2d6030';
    for(let i=0;i<6;i++){
      const mx=((i*55+18+this.h2X*9))%(LW+45)-22;
      X.beginPath();X.arc(mx+14,LH-12,16,Math.PI,0);X.fill();
    }
    // clouds
    this.clouds.forEach(c=>blit(CLD,Math.floor(c.x),Math.floor(c.y)));
    // bushes
    [2,26,52,80,110,144,178,210].forEach(bx=>blit(BUSH,bx,LH-12));
    // pipes
    [18,68,122,178].forEach(bx=>blit(PIPE,bx,LH-18));
    // blocks
    [10,12,38,40,76,78,108,110].forEach(bx=>blit(CB,bx,LH-24));
    // ground
    X.fillStyle='#4db324'; X.fillRect(0,LH-7,LW,3);
    X.fillStyle='#3a8818'; X.fillRect(0,LH-4,LW,1);
    for(let tx=0;tx<LW;tx+=6){
      X.fillStyle=Math.floor(tx/6)%2===0?'#C84010':'#B03408';
      X.fillRect(tx,LH-3,6,3);
      X.fillStyle='rgba(0,0,0,.15)';
      X.fillRect(tx,LH-3,6,.5); X.fillRect(tx,LH-3,.5,3);
    }
    X.fillStyle='#882000'; X.fillRect(0,LH-1,LW,1);
  },

  dPlayer(){
    const p=this.pl; if(!p)return;
    if(p.hurt>0&&Math.floor(this.tick/4)%2===0)return;
    X.fillStyle='rgba(0,0,0,.18)';
    X.beginPath();X.ellipse(p.x+6,LH-4,6,1.5,0,0,Math.PI*2);X.fill();
    blit(NK,Math.round(p.x),Math.round(p.y),p.face<0);
    if(p.wt>0){
      const wo=p.wf%2===0?0:1;
      X.fillStyle='#606878';
      X.fillRect(Math.round(p.x)+2+wo,Math.round(p.y)+14,3,1);
      X.fillRect(Math.round(p.x)+6-wo,Math.round(p.y)+14,3,1);
    }
    if(p.sh>0){
      X.fillStyle='rgba(255,224,80,.38)';
      X.beginPath();X.arc(p.face>0?p.x+13:p.x-4,p.y+4,3.5,0,Math.PI*2);X.fill();
    }
  },

  dMons(){
    this.mons.forEach(m=>{
      if(m.dead)return;
      const f=FL[m.fi];
      const sp=mkE(m.type===0?BL:SK,f.c,f.h,m.hf>0);
      const my=Math.round(m.y+m.by);
      X.fillStyle='rgba(0,0,0,.16)';
      X.beginPath();X.ellipse(m.x+5,LH-4,5,1.5,0,0,Math.PI*2);X.fill();
      blit(sp,Math.round(m.x),my,m.vx<0);
      X.fillStyle='#fff';
      X.fillRect(m.x+2,my+3,3,3); X.fillRect(m.x+5,my+3,3,3);
      X.fillStyle=m.hf>0?f.c:'#111';
      X.fillRect(m.x+3,my+4,2,2); X.fillRect(m.x+6,my+4,2,2);
      X.fillStyle='#fff';
      X.fillRect(m.x+3,my+4,1,1); X.fillRect(m.x+6,my+4,1,1);
      const bw=10;
      X.fillStyle='#111'; X.fillRect(m.x,m.y-3,bw,2);
      X.fillStyle=m.hp/m.mhp>.6?'#3DCA6E':m.hp/m.mhp>.3?'#F0A030':'#FF3D8A';
      X.fillRect(m.x,m.y-3,bw*m.hp/m.mhp,2);
    });
  },

  dBuls(){
    this.buls.forEach(b=>{
      X.fillStyle='rgba(255,224,0,.2)';
      X.beginPath();X.arc(b.x+1,b.y+2,3,0,Math.PI*2);X.fill();
      blit(BUL,Math.round(b.x),Math.round(b.y));
    });
  },

  dDrops(){
    this.drps.forEach(d=>{
      const f=FL[d.fi]; const bob=Math.sin(d.bt*.1)*1.1;
      X.fillStyle=f.c+'2a';
      X.beginPath();X.arc(d.x+4,d.y+4+bob,7,0,Math.PI*2);X.fill();
      blit(mkScoop(f.c,f.h),Math.round(d.x),Math.round(d.y+bob));
    });
  },

  dItems(){
    X.fillStyle='rgba(0,10,30,.05)';
    for(let y=0;y<LH;y+=3)X.fillRect(0,y,LW,1);
    this.items.forEach(item=>{
      if(item.done)return;
      const f=FL[item.fi];
      const bob=Math.sin(item.bt*.07)*1.2;
      const ix=Math.round(item.x), iy=Math.round(item.y+bob);
      X.globalAlpha=.4+Math.sin(item.bt*.1)*.28;
      X.strokeStyle=item.bad?'#FF3D8A':f.c; X.lineWidth=1.5;
      X.beginPath();X.arc(ix+4,iy+4,8,0,Math.PI*2);X.stroke();
      X.globalAlpha=1; X.lineWidth=1;
      blit(mkScoop(f.c,f.h),ix,iy);
      if(item.bad){
        X.fillStyle='#FF3D8A'; X.font='bold 5px Courier New';
        X.textAlign='center'; X.fillText('✗',ix+4,iy-2);
      }
      X.fillStyle='#FFD700'; X.font='bold 4px Courier New';
      X.textAlign='center'; X.fillText(f.n,ix+4,iy+12);
    });
    X.fillStyle='rgba(0,0,0,.6)'; X.fillRect(0,LH-10,LW,10);
    X.fillStyle='#887755'; X.font='4px Courier New'; X.textAlign='center';
    X.fillText('TOCCA gli ingredienti giusti — evita le trappole ✗',LW/2,LH-3.5);
  },

  dCust(){
    if(!this.cust)return;
    const cx=this.cust.x, cy=this.cust.y;
    const bob=Math.sin(this.cust.a*.09)*.8;
    X.fillStyle='rgba(0,0,0,.18)';
    X.beginPath();X.ellipse(cx+5,LH-4,7,2,0,0,Math.PI*2);X.fill();
    blit(CUST,Math.round(cx),Math.round(cy+bob));
    if(!this.serving){
      const bx=cx-4, by=cy-12, bw=20, bh=9;
      X.fillStyle='#fffef0'; X.strokeStyle='#ddd'; X.lineWidth=.5;
      X.beginPath();
      X.roundRect?X.roundRect(bx,by,bw,bh,3):X.rect(bx,by,bw,bh);
      X.fill(); X.stroke();
      X.fillStyle='#222'; X.font='bold 5px Courier New'; X.textAlign='center';
      X.fillText(this.tR.map(fi=>EM[fi]).join('+'),cx+6,by+bh-2);
      X.fillStyle='#fffef0'; X.fillRect(cx+4,by+bh-1,3,2);
    }
    X.fillStyle='#111'; X.fillRect(cx-2,cy+14,20,2);
    X.fillStyle=this.custT>200?'#3DCA6E':this.custT>100?'#F0A030':'#FF3D8A';
    X.fillRect(cx-2,cy+14,20*(this.custT/300),2);
  },

  dServeRes(){
    if(this.serving&&this.sTimer>60){
      X.fillStyle='rgba(0,0,0,.8)'; X.fillRect(0,LH/2-14,LW,28);
      X.fillStyle=this.sResult?'#3DCA6E':'#FF3D8A';
      X.font='bold 8px Courier New'; X.textAlign='center';
      X.fillText(this.sResult?'PERFETTO! +'+150*this.wave+' pts':'SBAGLIATO! -1 vita',LW/2,LH/2+3);
    }
  },

  dTrans(){
    if(this.transT>0){
      X.fillStyle='rgba(0,0,0,.76)'; X.fillRect(0,LH/2-14,LW,28);
      X.fillStyle='#FFD700'; X.font='bold 9px Courier New'; X.textAlign='center';
      X.fillText('★ ONDA '+this.wave+' COMPLETATA! ★',LW/2,LH/2+3);
    }
  },

  dParts(){
    PARTS.forEach(p=>{
      X.globalAlpha=Math.max(0,p.life/55);
      X.fillStyle=p.c; X.fillRect(p.x,p.y,p.sz,p.sz);
      X.fillStyle='rgba(255,255,255,.4)'; X.fillRect(p.x,p.y,p.sz*.5,p.sz*.5);
    });
    X.globalAlpha=1;
  },
};

// ── CANVAS TAP ──
function handleTap(cx,cy){
  if(G.state!=='collect') return;
  G.items.forEach(item=>{
    if(item.done)return;
    const bob=Math.sin(item.bt*.07)*1.2;
    if(Math.abs(cx-(item.x+4))<11&&Math.abs(cy-(item.y+4+bob))<11){
      item.done=true;
      if(!item.bad){
        G.collected.push(item.fi);
        boom(item.x+4,item.y+4,FL[item.fi].c,12,true);
        G.updRB();
        if(G.collected.length===G.tR.length){
          const ok=G.tR.every(fi=>G.collected.includes(fi));
          if(ok) setTimeout(()=>G.initServe(),500);
          else  {G.collected=[]; G.updRB();}
        }
      } else {
        boom(item.x+4,item.y+4,'#FF3D8A',14,true);
        G.hp=Math.max(0,G.hp-1); G.syncHUD();
        if(G.hp<=0) G.gameOver(false);
      }
    }
  });
}
CV.addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=CV.getBoundingClientRect();
  handleTap((t.clientX-r.left)*LW/r.width,(t.clientY-r.top)*LH/r.height);
},{passive:false});
CV.addEventListener('click',e=>{
  const r=CV.getBoundingClientRect();
  handleTap((e.clientX-r.left)*LW/r.width,(e.clientY-r.top)*LH/r.height);
});

$('ob').addEventListener('touchend',e=>{e.preventDefault();G.restart();},{passive:false});
$('ob').addEventListener('click',()=>G.restart());

function loop(){ G.update(); G.draw(); requestAnimationFrame(loop); }
G.restart(); loop();
</script>
</body>
</html>
